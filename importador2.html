<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importador de Contas a Pagar - RV</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-10 font-sans text-slate-800">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-2 text-red-700">Importador: Contas a Pagar (Despesas)</h1>
        <p class="text-sm text-slate-500 mb-6">Selecione o ficheiro .CSV de despesas exportado do sistema antigo para injetar no Supabase.</p>

        <div class="mb-6 p-4 border-2 border-dashed border-slate-300 rounded-lg text-center bg-slate-50">
            <input type="file" id="csvFileInput" accept=".csv" class="w-full text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100 cursor-pointer"/>
        </div>

        <button id="btnImportar" onclick="processarCSV()" class="w-full bg-red-600 text-white font-bold py-3 px-4 rounded hover:bg-red-700 transition-colors hidden">
            Iniciar Importação
        </button>

        <div id="logArea" class="mt-6 text-sm text-slate-600 bg-slate-900 p-4 rounded-lg hidden">
            <h3 class="font-bold text-white mb-2">Logs da Importação:</h3>
            <ul id="logList" class="list-disc pl-5 space-y-1 text-green-400 font-mono text-xs"></ul>
        </div>
    </div>

    <script>
        // Credenciais do Supabase
        const SUPABASE_URL = 'https://lyieiqhkspbowsrlngvn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';

        const fileInput = document.getElementById('csvFileInput');
        const btnImportar = document.getElementById('btnImportar');
        const logArea = document.getElementById('logArea');
        const logList = document.getElementById('logList');

        fileInput.addEventListener('change', () => {
            if(fileInput.files.length > 0) btnImportar.classList.remove('hidden');
        });

        function addLog(msg, isError = false) {
            logArea.classList.remove('hidden');
            const li = document.createElement('li');
            li.textContent = msg;
            if(isError) li.className = 'text-red-400';
            logList.appendChild(li);
        }

        // Formata data de DD/MM/YYYY para YYYY-MM-DD
        function formatarData(dataStr) {
            if (!dataStr) return null; // Retorna nulo se não houver data, para não inserir datas falsas
            let partes = dataStr.trim().split('/');
            if (partes.length === 3) {
                let ano = partes[2].length === 2 ? `20${partes[2]}` : partes[2];
                return `${ano}-${partes[1]}-${partes[0]}`;
            }
            return null;
        }

        // Formata Moeda Brasileira para Float
        function formatarMoeda(valorStr) {
            if (!valorStr) return 0;
            let val = String(valorStr).replace(/R\$/g, '').replace(/\./g, '').replace(',', '.').trim();
            return parseFloat(val) || 0;
        }

        async function processarCSV() {
            const file = fileInput.files[0];
            if (!file) return;

            btnImportar.disabled = true;
            btnImportar.innerText = "A processar...";
            logList.innerHTML = ''; 

            const reader = new FileReader();
            reader.onload = async function(e) {
                const text = e.target.result;
                const linhas = text.split('\n').filter(l => l.trim().length > 0);
                
                const cabecalhoTexto = linhas[0];
                const separador = cabecalhoTexto.includes(';') ? ';' : ',';
                const colunasCabecalho = cabecalhoTexto.split(separador);

                const mapColunas = {
                    vencimento: colunasCabecalho.findIndex(c => c.trim() === 'Vencimento'),
                    pessoa: colunasCabecalho.findIndex(c => c.trim() === 'Pessoa'),
                    descricao: colunasCabecalho.findIndex(c => c.trim() === 'Descrição do Título'),
                    valorTotal: colunasCabecalho.findIndex(c => c.trim() === 'Valor Título'),
                    valorPago: colunasCabecalho.findIndex(c => c.trim() === 'Valor Pago'),
                    tipoGasto: colunasCabecalho.findIndex(c => c.trim() === 'Tipo de Gasto'),
                    dataBaixa: colunasCabecalho.findIndex(c => c.trim() === 'Data Baixa') // Tentando pegar a data de pagamento
                };

                addLog(`Ficheiro lido. Encontradas ${linhas.length - 1} contas a pagar a importar.`);

                let payloadSupabase = [];

                for (let i = 1; i < linhas.length; i++) {
                    let cols = linhas[i].split(new RegExp(`${separador}(?=(?:(?:[^"]*"){2})*[^"]*$)`));
                    cols = cols.map(c => c.replace(/^"|"$/g, '').trim());

                    let nomeFornecedor = cols[mapColunas.pessoa] || 'FORNECEDOR NÃO INFORMADO';
                    let descricaoOld = cols[mapColunas.descricao] || 'Despesa importada';
                    let tipoGasto = (mapColunas.tipoGasto !== -1 && cols[mapColunas.tipoGasto]) ? cols[mapColunas.tipoGasto] : 'Outros';
                    let valTotal = formatarMoeda(cols[mapColunas.valorTotal]);
                    let valPago = formatarMoeda(cols[mapColunas.valorPago]);
                    
                    let dataVencimento = formatarData(cols[mapColunas.vencimento]);
                    let dataPagamento = (mapColunas.dataBaixa !== -1) ? formatarData(cols[mapColunas.dataBaixa]) : null;

                    let statusFin = 'PENDENTE';
                    if (valPago >= valTotal && valTotal > 0) {
                        statusFin = 'PAGO';
                        // Se foi pago mas não tem data de baixa, usa a data de hoje para não deixar em branco
                        if (!dataPagamento) dataPagamento = new Date().toISOString().split('T')[0];
                    } else if (valPago > 0) {
                        statusFin = 'PARCIAL';
                    }

                    // Objeto exato conforme as colunas da sua tabela 'despesas' no Supabase
                    payloadSupabase.push({
                        descricao: `SISTEMA ANTIGO: ${descricaoOld}`,
                        categoria: tipoGasto,
                        data_vencimento: dataVencimento,
                        fornecedor: nomeFornecedor,
                        valor_total: valTotal,
                        status_financeiro: statusFin,
                        data_pagamento: dataPagamento,
                        observacao: "Importação de base antiga"
                    });
                }

                addLog(`A preparar envio de ${payloadSupabase.length} registos para o Supabase...`);

                // Envia para a tabela despesas no Supabase
                try {
                    let res = await fetch(`${SUPABASE_URL}/rest/v1/despesas`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify(payloadSupabase)
                    });

                    if (res.ok) {
                        addLog(`✅ SUCESSO! Todas as despesas foram importadas.`);
                        alert("Importação de Contas a Pagar concluída com sucesso!");
                    } else {
                        let erroText = await res.text();
                        addLog(`❌ ERRO DO SUPABASE: ` + erroText, true);
                    }
                } catch(e) {
                    addLog(`❌ ERRO DE CONEXÃO: ` + e.message, true);
                }

                btnImportar.disabled = false;
                btnImportar.innerText = "Importação Finalizada";
            };
            
            reader.readAsText(file, 'ISO-8859-1');
        }
    </script>
</body>
</html>
