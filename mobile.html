<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="RV Portal Madeiras">
    <meta name="apple-mobile-web-app-title" content="RV Portal Madeiras">
    <meta name="theme-color" content="#0f172a">

    <style>
      body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; }
      
      .border { 
          border-width: 1px !important; 
          border-style: solid !important; 
          border-color: #e2e8f0 !important; 
      }
      
      .hidden-section { display: none !important; }
      .active-section { display: block !important; animation: fadeIn 0.3s ease-in-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .loader { border: 3px solid #e2e8f0; border-top: 3px solid #059669; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      /* Esconde a barra de rolagem mas permite rolar */
      ::-webkit-scrollbar { width: 0px; background: transparent; }

      .nav-active { color: #059669 !important; }
      .nav-active span { font-weight: 900; }
    </style>
  </head>
  <body class="text-slate-800 pb-20">

    <header class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border-2 border-emerald-500 bg-white overflow-hidden p-0.5 flex items-center justify-center">
                <img src="https://i.postimg.cc/52cvrkkP/LOGRVPORTAL.png" class="w-full h-full object-contain" />
            </div>
            <h1 class="text-lg font-black tracking-wider text-emerald-400">RV PORTAL</h1>
        </div>
        <button onclick="fazerLogout()" class="text-red-400 hover:text-red-300 p-2"><i data-lucide="log-out"></i></button>
    </header>

    <div id="loading" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center">
       <div class="bg-white p-6 rounded-2xl flex flex-col items-center shadow-2xl"><div class="loader mb-4"></div><span class="font-bold text-slate-700">Carregando...</span></div>
    </div>
    
    <div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm z-50 transition-all text-center min-w-[250px]"></div>

    <main class="p-4 overflow-x-hidden">

      <div id="view-quotes" class="hidden-section">
          <div class="flex flex-col gap-3 mb-4">
              <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2"><i data-lucide="folder-open" class="text-indigo-600"></i> Orçamentos</h2>
              
              <div class="flex flex-col gap-2">
                  <div class="relative w-full">
                      <i data-lucide="search" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                      <input type="text" id="quote-search" placeholder="Buscar cliente..." class="w-full pl-10 p-3 border rounded-xl text-sm focus:ring-2 focus:ring-indigo-600 outline-none shadow-sm font-medium bg-white" onkeyup="renderQuotesList()">
                  </div>
                  <select id="quote-status-filter" class="w-full p-3 border rounded-xl text-sm focus:ring-2 focus:ring-indigo-600 outline-none shadow-sm font-bold text-slate-600 bg-white" onchange="renderQuotesList()">

                      <option value="ABERTO">Abertos</option>
                      <option value="EM NEGOCIAÇÃO">Em Negociação</option>
                      <option value="APROVADO">Aprovados</option>

              </div>

      </div>
      
      <div id="view-fin" class="hidden-section">
        <h2 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-2"><i data-lucide="bar-chart-3" class="text-emerald-600"></i> Caixa</h2>
        
        <div class="flex flex-col gap-4">
            <div class="bg-green-50 p-6 rounded-2xl border border-green-200 shadow-sm relative overflow-hidden">
                <i data-lucide="trending-up" class="absolute -right-4 -bottom-4 w-24 h-24 text-green-200 opacity-50"></i>
                <p class="text-green-800 text-xs font-bold uppercase tracking-wider mb-2 relative z-10">Receitas Totais</p>
                <h3 id="fin-income" class="text-4xl font-black text-green-600 relative z-10">R$ 0,00</h3>
            </div>
            
            <div class="bg-red-50 p-6 rounded-2xl border border-red-200 shadow-sm relative overflow-hidden">
                <i data-lucide="trending-down" class="absolute -right-4 -bottom-4 w-24 h-24 text-red-200 opacity-50"></i>
                <p class="text-red-800 text-xs font-bold uppercase tracking-wider mb-2 relative z-10">Saídas (Despesas)</p>
                <h3 id="fin-expenses" class="text-4xl font-black text-red-600 relative z-10">R$ 0,00</h3>
            </div>
            
            <div class="bg-indigo-50 p-6 rounded-2xl border border-indigo-200 shadow-sm relative overflow-hidden mt-2">

      <div id="view-prod" class="hidden-section">

              <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2"><i data-lucide="package" class="text-orange-500"></i> Produtos</h2>

          <div class="flex flex-col gap-2 mb-4">

                  <input type="text" id="prod-search" placeholder="Buscar produto..." class="w-full pl-10 p-3 border rounded-xl text-sm outline-none focus:border-orange-500 font-medium bg-white" onkeyup="renderProducts()">

              <select id="prod-category" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-orange-500 font-bold text-slate-600 bg-white" onchange="renderProducts()">

          <div id="prod-list" class="flex flex-col gap-3"></div>

      <div id="view-clients" class="hidden-section">
          <div class="flex justify-between items-center mb-4">

              <button onclick="openClientForm()" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold shadow-lg shadow-blue-200 flex items-center gap-2 active:scale-95 transition-transform"><i data-lucide="plus"></i> Novo</button>
          </div>
          
          <div class="mb-4">
              <div class="relative w-full">
                  <i data-lucide="search" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                  <input type="text" id="cli-search" placeholder="Buscar por nome, telefone ou doc..." class="w-full pl-10 p-3 border rounded-xl outline-none focus:border-blue-600 font-medium bg-white shadow-sm" onkeyup="renderClients()">

    <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-40 flex justify-around items-center pb-safe" style="padding-bottom: env(safe-area-inset-bottom);">

            <span class="text-[10px] uppercase font-medium">Orçamentos</span>
        </button>
        <button onclick="navigate('fin')" id="nav-fin" class="flex-1 flex flex-col items-center justify-center py-3 text-slate-400 transition-colors">
            <i data-lucide="bar-chart-3" class="mb-1 w-6 h-6"></i>
            <span class="text-[10px] uppercase font-medium">Caixa</span>
        </button>
        <button onclick="navigate('prod')" id="nav-prod" class="flex-1 flex flex-col items-center justify-center py-3 text-slate-400 transition-colors">
            <i data-lucide="package" class="mb-1 w-6 h-6"></i>
            <span class="text-[10px] uppercase font-medium">Produtos</span>
        </button>
        <button onclick="navigate('clients')" id="nav-clients" class="flex-1 flex flex-col items-center justify-center py-3 text-slate-400 transition-colors">

            <span class="text-[10px] uppercase font-medium">Clientes</span>

    <div id="client-form-container" class="hidden fixed inset-0 bg-slate-900/70 z-50 flex items-end justify-center sm:items-center">

            <h3 class="font-black text-xl mb-6 text-slate-800 flex items-center gap-2"><i data-lucide="user-plus" class="text-blue-500"></i> Dados do Cliente</h3>
            <input type="hidden" id="cli-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nome Completo</label>
                    <input type="text" id="cli-name" required class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Telefone / WhatsApp</label>
                    <input type="tel" id="cli-phone" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium" placeholder="(00) 00000-0000">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Documento (CPF/CNPJ)</label>

                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Endereço</label>

                <button type="submit" class="flex-1 p-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-transform">Salvar</button>

        </form>
    </div>

    <div id="prod-form-container" class="hidden fixed inset-0 bg-slate-900/70 z-50 flex items-end justify-center sm:items-center">
        <form onsubmit="saveProduct(event)" class="bg-white p-6 rounded-t-3xl sm:rounded-2xl shadow-2xl w-full max-w-md animate-[fadeIn_0.3s]">
            <div class="w-12 h-1.5 bg-slate-300 rounded-full mx-auto mb-4 sm:hidden"></div>
            <h3 class="font-black text-xl mb-6 text-slate-800 flex items-center gap-2"><i data-lucide="package-plus" class="text-orange-500"></i> Dados do Produto</h3>
            <input type="hidden" id="prd-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nome do Produto</label>
                    <input type="text" id="prd-name" required class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500 font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Categoria</label>
                    <input type="text" id="prd-cat" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500 font-medium">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Preço Venda</label>
                        <input type="number" id="prd-price" required step="0.01" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500 font-bold text-slate-800">

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Custo Compra</label>
                        <input type="number" id="prd-cost" step="0.01" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500 font-bold text-slate-800">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Estoque Inicial Físico</label>
                    <input type="number" id="prd-stock" required class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500 font-bold text-slate-800">

            </div>
            <div class="flex gap-3 mt-8">

    <script>
        // Configuração Inicial Igual
        let dadosUsuario = null;
        const userSessao = localStorage.getItem('rv_user');

        if (!userSessao) { window.location.replace('index.html'); } 
        else { dadosUsuario = JSON.parse(userSessao); }

        const supabaseUrl = 'https://lyieiqhkspbowsrlngvn.supabase.co'; 
        const supabaseKey = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        let STATE = { products: [], clients: [], logs: [], quotes: [], expenses: [], users: [] };

        window.onload = function() { 
            if (dadosUsuario) {
                showLoading(true); 
                loadData(); 
            }
        };

        // ====== NAVEGAÇÃO MOBILE ======
        function navigate(viewId) {
            // Oculta tudo
            document.querySelectorAll('div[id^="view-"]').forEach(el => { el.classList.add('hidden-section'); el.classList.remove('active-section'); });
            
            // Mostra a tela alvo
            const target = document.getElementById('view-' + viewId);
            if(target) { target.classList.remove('hidden-section'); target.classList.add('active-section'); }
            
            // Remove classe ativa de todos botões do menu inferior
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('nav-active');
            });
            
            // Adiciona classe ativa no botão clicado
            const activeBtn = document.getElementById('nav-' + viewId);
            if(activeBtn) activeBtn.classList.add('nav-active');
            
            // Renderiza conteúdo dependendo da aba
            if(viewId === 'quotes') renderQuotesList();
            if(viewId === 'fin') renderFinance();
            if(viewId === 'prod') renderProducts();
            if(viewId === 'clients') renderClients();
            
            lucide.createIcons();
            window.scrollTo(0, 0); // Joga pro topo ao trocar de tela
        }

        // Funções Auxiliares
        function formatMoney(val) { return parseFloat(val || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
        function formatDate(d) { try { return d ? new Date(d).toLocaleDateString('pt-BR') : '-'; } catch(e) { return '-'; } }
        function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }
        
        function showToast(msg, isError) { 
            const t = document.getElementById('toast'); 
            t.textContent = msg; 
            t.className = `fixed top-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm z-50 transition-all text-center min-w-[250px] ${isError ? 'bg-red-600' : 'bg-slate-900'}`; 
            t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 3000); 
        }

        function getNextId(array1, array2 = []) {
            let max = 0;
            array1.forEach(item => { const val = parseInt(item.id); if(!isNaN(val) && val > max) max = val; });
            array2.forEach(item => { const val = parseInt(item.id); if(!isNaN(val) && val > max) max = val; });
            return max + 1;
        }

        // ====== BUSCA DE DADOS ======
        async function fetchAllRecords(table) {
            let allRecords = [];
            let from = 0;
            const step = 1000;
            let keepFetching = true;

            while (keepFetching) {
                const { data, error } = await sb.from(table).select('*').range(from, from + step - 1);
                if (error) throw error;
                if (data && data.length > 0) {
                    allRecords.push(...data);
                    if (data.length < step) keepFetching = false;
                    else from += step;
                } else {
                    keepFetching = false;
                }
            }
            return { data: allRecords };
        }

        async function loadData() {
            try {
                const [resProd, resCli, resLog, resDesp] = await Promise.all([
                    fetchAllRecords('produtos'), fetchAllRecords('clientes'),
                    fetchAllRecords('logs'), fetchAllRecords('despesas')
                ]);

                STATE.products = (resProd.data || []).map(p => ({
                    id: p.id, name: p.nome, category: p.categoria, price: Number(p.preco),
                    cost: Number(p.custo) || 0, stock: Number(p.estoque_fisico), 
                    committed: Number(p.estoque_comprometido),
                    available: Number(p.estoque_fisico) - Number(p.estoque_comprometido)
                }));

                STATE.clients = (resCli.data || []).map(c => ({
                    id: c.id, name: c.nome, phone: c.telefone, doc: c.documento, address: c.endereco
                }));

                STATE.logs = [];
                const quotesMap = {};
                
                (resLog.data || []).forEach(l => {
                    if (l.tipo === 'orcamento') {
                        const qId = String(l.id);
                        if(!quotesMap[qId]) {
                            quotesMap[qId] = { 
                                id: qId, date: l.data, clientName: l.cliente_nome, items: [], total: 0, 
                                status: l.status || 'ABERTO', discount: Number(l.desconto), discountType: l.status_financeiro || '$', 
                                paymentMethod: l.forma_pagamento, deliveryAddress: l.endereco_entrega, observacao: l.observacao
                            };
                        }
                        const unitPrice = Number(l.quantidade) > 0 ? Number(l.valor_total) / Number(l.quantidade) : 0;
                        quotesMap[qId].items.push({ name: l.produto_nome, qty: Number(l.quantidade), price: unitPrice, total: Number(l.valor_total), uid: l.uid });
                        quotesMap[qId].total += Number(l.valor_total);
                    } else {
                        STATE.logs.push({
                            uid: l.uid, id: l.id, type: l.tipo, productName: l.produto_nome, quantity: Number(l.quantidade),
                            date: l.data, note: l.observacao, totalValue: Number(l.valor_total),
                            clientName: l.cliente_nome, paymentMethod: l.forma_pagamento, status: l.status,
                            finStatus: l.status_financeiro, dueDate: l.vencimento, paidValue: Number(l.valor_pago)
                        });
                    }
                });
                
                STATE.quotes = Object.values(quotesMap).map(q => { q.itemsText = q.items.map(i => `${i.qty}x ${i.name}`).join(', '); return q; });
                
                STATE.expenses = (resDesp.data || []).map(e => ({
                    id: e.id, item: e.item, quantity: Number(e.quantidade), cost: Number(e.custo), 
                    date: e.data, status: e.status || 'PENDENTE'
                }));

                onDataLoaded();
            } catch (err) {
                showLoading(false);
                showToast("Erro de conexão", true);
                console.error(err);
            }
        }

        function onDataLoaded() {
            if(!document.querySelector('.active-section')) {
                navigate('quotes'); // Começa pela aba de Orçamentos
            } else {
                const current = document.querySelector('.active-section').id.replace('view-','');
                navigate(current);
            }
            showLoading(false);
        }

        // ================= FUNÇÕES DE ORÇAMENTO (CARDS MOBILE) =================

        async function updateQuoteStatus(id, newStatus) {
            showLoading(true);
            const { error } = await sb.from('logs').update({ status: newStatus }).eq('id', id).eq('tipo', 'orcamento');
            if (error) { showLoading(false); return showToast("Erro: " + error.message, true); }
            const quote = STATE.quotes.find(q => String(q.id) === String(id));
            if (quote) quote.status = newStatus;
            showLoading(false);
            showToast("Status Atualizado!");
            renderQuotesList(); 
        }

        async function deleteQuote(id) {
            if(!confirm("Excluir este orçamento definitivamente?")) return;
            showLoading(true);
            const { error } = await sb.from('logs').delete().eq('id', id).eq('tipo', 'orcamento');
            if(error) { showLoading(false); return showToast("Erro: " + error.message, true); }
            showToast("Orçamento Excluído!");
            loadData();
        }

        async function shareQuote(id) {
            const q = STATE.quotes.find(x => x.id == id);
            if (!q) return;
            
            const valorLiquido = q.total - (q.discount || 0);
            const textoCompartilhar = `*RV PORTAL MADEIRAS*\nOrçamento Nº ${q.id}\nCliente: ${q.clientName}\n\n*Itens:*\n${q.itemsText}\n\n*Total:* ${formatMoney(valorLiquido)}\n\n(Válido por 7 dias)`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `Orçamento #${q.id}`,
                        text: textoCompartilhar
                    });
                } catch (err) {
                    console.log('Compartilhamento cancelado ou falhou', err);
                }
            } else {
                // Fallback para copiar o texto se não houver suporte nativo
                navigator.clipboard.writeText(textoCompartilhar);
                showToast("Texto copiado para a área de transferência!");
            }
        }

        function renderQuotesList() {
            const list = document.getElementById('quotes-list');
            if(!list) return;

            const term = document.getElementById('quote-search')?.value.toLowerCase() || '';
            const statusFilter = document.getElementById('quote-status-filter')?.value || '';

            let filteredQuotes = STATE.quotes.slice().reverse();

            if (term) filteredQuotes = filteredQuotes.filter(q => q.clientName && q.clientName.toLowerCase().includes(term));
            if (statusFilter) filteredQuotes = filteredQuotes.filter(q => q.status === statusFilter);

            if(!filteredQuotes.length) { 
                list.innerHTML='<div class="text-center p-10 text-slate-400 font-bold">Nenhum orçamento encontrado.</div>'; 
                return; 
            }
            
            list.innerHTML = filteredQuotes.map(q => {
                const valorLiquido = q.total - (q.discount || 0);
                
                // Sistema de cores por status adaptado para Cards Mobile
                let bgBorderClass = "bg-white border-slate-200";
                let badgeClass = "bg-slate-100 text-slate-600";
                
                if (q.status === 'APROVADO') { bgBorderClass = "bg-emerald-50 border-emerald-300"; badgeClass = "bg-emerald-200 text-emerald-800"; }
                else if (q.status === 'PERDIDO') { bgBorderClass = "bg-red-50 border-red-300"; badgeClass = "bg-red-200 text-red-800"; }
                else if (q.status === 'EM NEGOCIAÇÃO') { bgBorderClass = "bg-indigo-50 border-indigo-300"; badgeClass = "bg-indigo-200 text-indigo-800"; }

                return `
                <div class="p-4 rounded-2xl border mb-1 shadow-sm ${bgBorderClass}">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <div class="font-black text-slate-800 text-lg">#${q.id}</div>
                            <div class="text-[11px] font-bold text-slate-500"><i data-lucide="calendar" class="inline w-3 h-3"></i> ${formatDate(q.date)}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-black text-xl text-slate-800">${formatMoney(valorLiquido)}</div>
                            <select onchange="updateQuoteStatus('${q.id}', this.value)" class="mt-2 py-1 px-2 rounded-lg text-xs font-bold outline-none border border-transparent appearance-none text-center w-full ${badgeClass}">
                                <option value="ABERTO" ${q.status === 'ABERTO' ? 'selected' : ''}>Em Aberto</option>
                                <option value="EM NEGOCIAÇÃO" ${q.status === 'EM NEGOCIAÇÃO' ? 'selected' : ''}>Negociando</option>
                                <option value="APROVADO" ${q.status === 'APROVADO' ? 'selected' : ''}>Aprovado</option>
                                <option value="PERDIDO" ${q.status === 'PERDIDO' ? 'selected' : ''}>Perdido</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-4 bg-white/60 p-3 rounded-xl">
                        <div class="font-bold text-slate-800 flex items-center gap-1 mb-1"><i data-lucide="user" class="w-4 h-4 text-slate-400"></i> ${q.clientName}</div>
                        <div class="text-xs text-slate-600 line-clamp-2 leading-relaxed font-medium pl-5">${q.itemsText || '...'}</div>
                    </div>
                    
                    <div class="flex gap-2 justify-end">
                        <button onclick="shareQuote('${q.id}')" class="flex-1 p-3 bg-white border border-slate-300 text-slate-700 rounded-xl flex justify-center items-center gap-2 font-bold shadow-sm active:scale-95 transition-transform">
                            <i data-lucide="share-2" class="w-5 h-5"></i> Enviar
                        </button>
                        <button onclick="deleteQuote('${q.id}')" class="p-3 bg-white border border-red-200 text-red-500 rounded-xl flex justify-center items-center shadow-sm active:scale-95 transition-transform" title="Excluir">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // ================= FUNÇÕES DO CAIXA (DASHBOARD) =================
        function renderFinance() {
            const salesMap = {};
            STATE.logs.filter(l => (l.type === 'venda' || l.type === 'receita') && l.status !== 'CANCELADO').forEach(l => {
                if(!salesMap[l.id]) {
                    salesMap[l.id] = { id: l.id, val: 0, paid: 0, status: l.finStatus };
                }
                salesMap[l.id].val += Number(l.totalValue) || 0;
                salesMap[l.id].paid = Math.max(salesMap[l.id].paid, Number(l.paidValue) || 0);
            });
            let salesArr = Object.values(salesMap);

            const income = salesArr.filter(s => s.status === 'PAGO').reduce((a, b) => a + b.val, 0) +
                           salesArr.filter(s => s.status !== 'PAGO').reduce((a, b) => a + b.paid, 0);
            
            const expenses = STATE.expenses.filter(e => e.status === 'PAGO').reduce((a, b) => a + Number(e.cost), 0);
            
            document.getElementById('fin-income').innerText = formatMoney(income);
            document.getElementById('fin-expenses').innerText = formatMoney(expenses);
            document.getElementById('fin-balance').innerText = formatMoney(income - expenses);
        }

        // ================= FUNÇÕES DE PRODUTOS =================
        function renderProducts() {
            const list = document.getElementById('prod-list');
            if(!list) return;

            const term = document.getElementById('prod-search')?.value.toLowerCase() || '';
            const catFilter = document.getElementById('prod-category')?.value || '';

            const catSelect = document.getElementById('prod-category');
            if (catSelect && catSelect.options.length <= 1) {
                const categoriasUnicas = [...new Set(STATE.products.map(p => p.category))].filter(c => c && c.trim() !== '');
                categoriasUnicas.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    catSelect.appendChild(option);
                });
            }

            let filtered = STATE.products.slice();
            if (term) filtered = filtered.filter(p => p.name.toLowerCase().includes(term));
            if (catFilter) filtered = filtered.filter(p => p.category === catFilter);

            if (filtered.length === 0) {
                list.innerHTML = '<div class="p-10 text-center text-slate-400 font-bold">Nenhum produto cadastrado.</div>';
                return;
            }

            list.innerHTML = filtered.map(p => `
            <div class="bg-white p-4 rounded-2xl border shadow-sm flex items-center justify-between mb-1">
                <div class="flex flex-col flex-1 mr-2 overflow-hidden">
                    <h4 class="font-black text-slate-800 text-sm truncate mb-1">${p.name}</h4>
                    <span class="text-[10px] text-slate-500 font-bold bg-slate-100 px-2 py-1 rounded w-max uppercase">${p.category || 'Geral'}</span>
                </div>
                <div class="flex flex-col items-end gap-1">
                    <span class="font-black text-orange-500 text-lg">${formatMoney(p.price)}</span>
                    <span class="text-[10px] text-slate-400 font-bold">Estoque: <span class="${p.available <= 0 ? 'text-red-500' : 'text-emerald-500'}">${p.available}</span></span>
                </div>
                <button onclick="openProductForm('${p.id}')" class="ml-4 p-3 bg-slate-50 text-slate-500 rounded-xl hover:bg-slate-200 active:scale-95 transition">
                    <i data-lucide="edit-3" class="w-5 h-5"></i>
                </button>
            </div>`).join('');
            lucide.createIcons(); 
        }

        function openProductForm(id) { 
            document.getElementById('prod-form-container').classList.remove('hidden'); 
            if(id) { 
                const p = STATE.products.find(x => x.id == id); 
                document.getElementById('prd-id').value = p.id; 
                document.getElementById('prd-name').value = p.name; 
                document.getElementById('prd-cat').value = p.category || ''; 
                document.getElementById('prd-price').value = p.price; 
                document.getElementById('prd-cost').value = p.cost || ''; 
                document.getElementById('prd-stock').value = p.stock; 
            } else { 
                document.getElementById('prd-id').value = ''; 
                document.getElementById('prd-name').value = ''; 
                document.getElementById('prd-cat').value = ''; 
                document.getElementById('prd-price').value = ''; 
                document.getElementById('prd-cost').value = ''; 
                document.getElementById('prd-stock').value = ''; 
            } 
        }

        async function saveProduct(e) {
            e.preventDefault();
            showLoading(true);
            const isNew = !document.getElementById('prd-id').value;
            const newId = isNew ? getNextId(STATE.products) : document.getElementById('prd-id').value;

            const payload = {
                id: newId, nome: document.getElementById('prd-name').value, categoria: document.getElementById('prd-cat').value,
                preco: parseFloat(document.getElementById('prd-price').value), 
                custo: parseFloat(document.getElementById('prd-cost').value) || 0,
                estoque_fisico: parseFloat(document.getElementById('prd-stock').value),
                estoque_comprometido: isNew ? 0 : STATE.products.find(p=>p.id==newId).committed
            };

            const { error } = await sb.from('produtos').upsert(payload);
            if(error) { showLoading(false); return showToast("Erro: " + error.message, true); }

            document.getElementById('prod-form-container').classList.add('hidden');
            showToast("Produto Salvo!");
            loadData();
        }

        // ================= FUNÇÕES DE CLIENTES =================
        function renderClients() {
            const list = document.getElementById('clients-list');
            if(!list) return;
            
            const term = document.getElementById('cli-search')?.value.toLowerCase() || '';
            let filtered = STATE.clients || [];

            if (term) {
                filtered = filtered.filter(c => 
                    c.name.toLowerCase().includes(term) || 
                    (c.phone && c.phone.toLowerCase().includes(term)) || 
                    (c.doc && c.doc.toLowerCase().includes(term))
                );
            }

            const sliced = filtered.slice(0, 150);

            if (sliced.length === 0) {
                list.innerHTML = '<div class="p-10 text-center text-slate-400 font-bold">Nenhum cliente encontrado.</div>';
                return;
            }

            list.innerHTML = sliced.map(c => {
                // Formatação do link pro WhatsApp
                let num = c.phone ? c.phone.replace(/\D/g, '') : '';
                if (num.length >= 10 && !num.startsWith('55')) num = '55' + num;
                const zapLink = num ? `https://wa.me/${num}` : '#';
                const hasZap = num.length >= 10;
                const zapClass = hasZap ? 'bg-green-100 text-green-700 active:bg-green-200' : 'bg-slate-100 text-slate-300 pointer-events-none opacity-50';

                return `
                <div class="bg-white p-5 rounded-2xl border shadow-sm mb-2 relative">
                    <h4 class="font-black text-slate-800 text-lg mb-2 pr-10 leading-tight">${c.name}</h4>
                    
                    <button onclick="openClientForm('${c.id}')" class="absolute top-4 right-4 p-2 text-slate-400 hover:text-blue-600 bg-slate-50 rounded-full active:scale-95 transition">
                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                    </button>

                    <div class="flex flex-col gap-1 text-sm font-medium text-slate-600 mb-4">
                        <span class="flex items-center gap-2"><i data-lucide="phone" class="w-4 h-4 text-slate-400"></i> ${c.phone || 'Sem telefone'}</span>
                        ${c.doc ? `<span class="flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4 text-slate-400"></i> ${c.doc}</span>` : ''}
                    </div>

                    <a href="${zapLink}" ${hasZap ? 'target="_blank"' : ''} class="w-full flex items-center justify-center gap-2 p-3 rounded-xl font-bold transition-transform active:scale-[0.98] ${zapClass}">
                        <i data-lucide="message-circle" class="w-5 h-5"></i> Chamar no WhatsApp
                    </a>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function openClientForm(id) { 
            document.getElementById('client-form-container').classList.remove('hidden'); 
            if(id) {
                const c = STATE.clients.find(x => String(x.id) === String(id));
                if(c) {
                    document.getElementById('cli-id').value = c.id;
                    document.getElementById('cli-name').value = c.name;
                    document.getElementById('cli-phone').value = c.phone;
                    document.getElementById('cli-doc').value = c.doc;
                    document.getElementById('cli-addr').value = c.address;
                }
            } else {
                document.getElementById('cli-id').value = '';
                document.getElementById('cli-name').value = '';
                document.getElementById('cli-phone').value = '';
                document.getElementById('cli-doc').value = '';
                document.getElementById('cli-addr').value = '';
            }
        }

        async function saveClient(e) {
            e.preventDefault();
            showLoading(true);
            const isNew = !document.getElementById('cli-id').value;
            const newId = isNew ? getNextId(STATE.clients) : document.getElementById('cli-id').value;

            const payload = {
                id: newId, nome: document.getElementById('cli-name').value, telefone: document.getElementById('cli-phone').value,
                documento: document.getElementById('cli-doc').value, endereco: document.getElementById('cli-addr').value
            };

            const { error } = await sb.from('clientes').upsert(payload);
            if(error) { showLoading(false); return showToast("Erro: " + error.message, true); }
            
            document.getElementById('client-form-container').classList.add('hidden');
            showToast("Cliente Salvo!");
            loadData();
        }

        function fazerLogout() {
            localStorage.removeItem('rv_user');
            window.location.replace('index.html');
        }

    </script>
  </body>
</html>
