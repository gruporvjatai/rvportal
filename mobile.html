    <style>
      body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; }
      
      .border { border-width: 1px !important; border-style: solid !important; border-color: #e2e8f0 !important; }
      
      .hidden-section { display: none !important; }
      .active-section { display: block !important; animation: fadeIn 0.3s ease-in-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .loader { border: 3px solid #e2e8f0; border-top: 3px solid #059669; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      ::-webkit-scrollbar { width: 0px; background: transparent; }

      .nav-active { color: #059669 !important; }
      .nav-active span { font-weight: 900; }

      /* Estilos para o PDF oculto na tela */
      .invoice-full { border: 1px solid #000; min-height: 27.5cm; background-color: transparent !important; position: relative; z-index: 1; font-family: 'Helvetica', 'Arial', sans-serif; color: #1e293b; padding: 15px; background: white;}
      .invoice-full::before { content: ""; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; height: 450px; background-image: url('https://i.postimg.cc/52cvrkkP/LOGRVPORTAL.png'); background-size: contain; background-position: center; background-repeat: no-repeat; opacity: 0.1; z-index: -1; }
      .header-section { display: flex; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
      .logo-area { width: 120px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #e2e8f0; padding-right: 15px; margin-right: 15px; }
      .company-details { flex: 1; }
      .company-title { font-size: 20px; font-weight: 800; color: #059669; margin: 0; }
      .company-info { font-size: 11px; color: #475569; margin-top: 5px; }
      .doc-meta { width: 180px; text-align: right; }
      .doc-title { font-size: 16px; font-weight: 900; color: #0f172a; margin-bottom: 5px; }
      .meta-row { font-size: 11px; margin-bottom: 2px; }
      .info-grid { display: flex; gap: 20px; margin-bottom: 20px; }
      .info-col { flex: 1; border: 1px solid #000; border-radius: 6px; overflow: hidden; }
      .col-header { background-color: #f1f5f9; padding: 5px 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #64748b; border-bottom: 1px solid #000; }
      .col-content { padding: 10px; font-size: 11px; line-height: 1.5; }
      .full-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px; }
      .full-table th { background-color: #0f172a; color: white; padding: 8px; text-align: left; }
      .full-table td { border-bottom: 1px solid #000; padding: 8px; }
      .footer-section { display: flex; gap: 30px; margin-top: 10px; }
      .notes-area { flex: 1; border: 1px dashed #cbd5e1; padding: 10px; border-radius: 6px; }
      .notes-title { font-size: 10px; font-weight: bold; margin-bottom: 5px; color: #64748b; }
      .notes-text { font-size: 10px; color: #334155; }
      .totals-area { width: 250px; }
      .total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 11px; border-bottom: 1px solid #e2e8f0; }
      .total-row.final { border-bottom: none; border-top: 2px solid #0f172a; font-size: 14px; font-weight: 900; background-color: #f1f5f9; padding: 10px; margin-top: 5px; }
    </style>

    <script>
        let dadosUsuario = null;
        const userSessao = localStorage.getItem('rv_user');

        if (!userSessao) { window.location.replace('index.html'); } 
        else { dadosUsuario = JSON.parse(userSessao); }

        const supabaseUrl = 'https://lyieiqhkspbowsrlngvn.supabase.co'; 
        const supabaseKey = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        let STATE = { products: [], clients: [], logs: [], quotes: [], expenses: [], users: [] };

        window.onload = function() { 
            if (dadosUsuario) {
                showLoading(true); 
                loadData(); 
            }
        };

        function navigate(viewId) {
            document.querySelectorAll('div[id^="view-"]').forEach(el => { el.classList.add('hidden-section'); el.classList.remove('active-section'); });
            
            const target = document.getElementById('view-' + viewId);
            if(target) { target.classList.remove('hidden-section'); target.classList.add('active-section'); }
            
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('nav-active');
            });
            
            const activeBtn = document.getElementById('nav-' + viewId);
            if(activeBtn) activeBtn.classList.add('nav-active');
            
            if(viewId === 'quotes') renderQuotesList();
            if(viewId === 'fin') renderFinance();
            if(viewId === 'prod') renderProducts();
            if(viewId === 'clients') renderClients();
            
            lucide.createIcons();
            window.scrollTo(0, 0); 
        }

        function formatMoney(val) { return parseFloat(val || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
        function formatDate(d) { try { return d ? new Date(d).toLocaleDateString('pt-BR') : '-'; } catch(e) { return '-'; } }
        function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }
        
        function showToast(msg, isError) { 
            const t = document.getElementById('toast'); 
            t.textContent = msg; 
            t.className = `fixed top-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm z-50 transition-all text-center min-w-[250px] ${isError ? 'bg-red-600' : 'bg-slate-900'}`; 
            t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 3000); 
        }

        function getNextId(array1, array2 = []) {
            let max = 0;
            array1.forEach(item => { const val = parseInt(item.id); if(!isNaN(val) && val > max) max = val; });
            array2.forEach(item => { const val = parseInt(item.id); if(!isNaN(val) && val > max) max = val; });
            return max + 1;
        }

        async function fetchAllRecords(table) {
            let allRecords = [];
            let from = 0;
            const step = 1000;
            let keepFetching = true;

            while (keepFetching) {
                const { data, error } = await sb.from(table).select('*').range(from, from + step - 1);
                if (error) throw error;
                if (data && data.length > 0) {
                    allRecords.push(...data);
                    if (data.length < step) keepFetching = false;
                    else from += step;
                } else {
                    keepFetching = false;
                }
            }
            return { data: allRecords };
        }

        async function loadData() {
            try {
                const [resProd, resCli, resLog, resDesp] = await Promise.all([
                    fetchAllRecords('produtos'), fetchAllRecords('clientes'),
                    fetchAllRecords('logs'), fetchAllRecords('despesas')
                ]);

                STATE.products = (resProd.data || []).map(p => ({
                    id: p.id, name: p.nome, category: p.categoria, price: Number(p.preco),
                    cost: Number(p.custo) || 0, stock: Number(p.estoque_fisico), 
                    committed: Number(p.estoque_comprometido),
                    available: Number(p.estoque_fisico) - Number(p.estoque_comprometido)
                }));

                STATE.clients = (resCli.data || []).map(c => ({
                    id: c.id, name: c.nome, phone: c.telefone, doc: c.documento, address: c.endereco
                }));

                STATE.logs = [];
                const quotesMap = {};
                
                (resLog.data || []).forEach(l => {
                    if (l.tipo === 'orcamento') {
                        const qId = String(l.id);
                        if(!quotesMap[qId]) {
                            quotesMap[qId] = { 
                                id: qId, date: l.data, clientName: l.cliente_nome, items: [], total: 0, 
                                status: l.status || 'ABERTO', discount: Number(l.desconto), discountType: l.status_financeiro || '$', 
                                paymentMethod: l.forma_pagamento, deliveryAddress: l.endereco_entrega, observacao: l.observacao
                            };
                        }
                        const unitPrice = Number(l.quantidade) > 0 ? Number(l.valor_total) / Number(l.quantidade) : 0;
                        quotesMap[qId].items.push({ name: l.produto_nome, qty: Number(l.quantidade), price: unitPrice, total: Number(l.valor_total), uid: l.uid });
                        quotesMap[qId].total += Number(l.valor_total);
                    } else {
                        STATE.logs.push({
                            uid: l.uid, id: l.id, type: l.tipo, productName: l.produto_nome, quantity: Number(l.quantidade),
                            date: l.data, note: l.observacao, totalValue: Number(l.valor_total),
                            clientName: l.cliente_nome, paymentMethod: l.forma_pagamento, status: l.status,
                            finStatus: l.status_financeiro, dueDate: l.vencimento, paidValue: Number(l.valor_pago)
                        });
                    }
                });
                
                STATE.quotes = Object.values(quotesMap).map(q => { q.itemsText = q.items.map(i => `${i.qty}x ${i.name}`).join(', '); return q; });
                
                STATE.expenses = (resDesp.data || []).map(e => ({

        // ================= FUNÇÕES DO CAIXA (DASHBOARD) =================
        function renderFinance() {
    const salesMap = {};
    
    // Filtra vendas e receitas exatamente igual ao seu desktop
    STATE.logs.filter(l => (l.type === 'venda' || l.type === 'receita') && l.status !== 'CANCELADO').forEach(l => {
        if(!salesMap[l.id]) {
            salesMap[l.id] = { id: l.id, val: 0, paid: 0, status: l.finStatus };
        }
        salesMap[l.id].val += Number(l.totalValue) || 0;
        salesMap[l.id].paid = Math.max(salesMap[l.id].paid, Number(l.paidValue) || 0);
    });
    let salesArr = Object.values(salesMap);

    // Soma das Receitas
    const income = salesArr.filter(s => s.status === 'PAGO').reduce((a, b) => a + b.val, 0) +
                   salesArr.filter(s => s.status !== 'PAGO').reduce((a, b) => a + b.paid, 0);

    // Soma das Despesas
    const expenses = STATE.expenses.filter(e => e.status === 'PAGO').reduce((a, e) => a + Number(e.cost), 0);

    // Atualiza a tela se os elementos existirem
    const elIncome = document.getElementById('fin-income');
    const elExpenses = document.getElementById('fin-expenses');
    const elBalance = document.getElementById('fin-balance');

    if(elIncome) elIncome.innerText = formatMoney(income);
    if(elExpenses) elExpenses.innerText = formatMoney(expenses);
    if(elBalance) elBalance.innerText = formatMoney(income - expenses);
}

        async function saveProduct(e) {
            e.preventDefault();
            showLoading(true);
            const isNew = !document.getElementById('prd-id').value;
            const newId = isNew ? getNextId(STATE.products) : document.getElementById('prd-id').value;

            const payload = {
                id: newId, nome: document.getElementById('prd-name').value, categoria: document.getElementById('prd-cat').value,
                preco: parseFloat(document.getElementById('prd-price').value), 
                custo: parseFloat(document.getElementById('prd-cost').value) || 0,
                estoque_fisico: parseFloat(document.getElementById('prd-stock').value),
                estoque_comprometido: isNew ? 0 : STATE.products.find(p=>p.id==newId).committed
            };

            const { error } = await sb.from('produtos').upsert(payload);
            if(error) { showLoading(false); return showToast("Erro: " + error.message, true); }

            document.getElementById('prod-form-container').classList.add('hidden');
            showToast("Produto Salvo!");
            loadData();
        }

                    c.name.toLowerCase().includes(term) || 
                    (c.phone && c.phone.toLowerCase().includes(term)) || 
                    (c.doc && c.doc.toLowerCase().includes(term))
                );

            const sliced = filtered.slice(0, 150);

            if (sliced.length === 0) {
                list.innerHTML = '<div class="p-10 text-center text-slate-400 font-bold">Nenhum cliente encontrado.</div>';
                return;

                let num = c.phone ? c.phone.replace(/\D/g, '') : '';
                if (num.length >= 10 && !num.startsWith('55')) num = '55' + num;
                const zapLink = num ? `https://wa.me/${num}` : '#';
                const hasZap = num.length >= 10;
                
                // Opacidade reduzida se não tiver WhatsApp para evitar falsos cliques
                const zapClass = hasZap ? 'bg-green-50 text-green-600 hover:bg-green-100' : 'bg-slate-50 text-slate-300 pointer-events-none';

                return `
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center mb-1">
                    <div class="flex flex-col flex-1 truncate mr-3">
                        <span class="font-bold text-sm text-slate-800 truncate">${c.name}</span>
                        <span class="text-[11px] text-slate-500 font-medium mt-0.5">${c.phone || 'Sem telefone'}</span>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <a href="${zapLink}" ${hasZap ? 'target="_blank"' : ''} class="w-10 h-10 flex items-center justify-center rounded-full transition-colors active:scale-95 ${zapClass}" title="WhatsApp">
                            <i data-lucide="message-circle" class="w-5 h-5"></i>
                        </a>
                        <button onclick="openClientForm('${c.id}')" class="w-10 h-10 flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-full transition-colors active:scale-95" title="Editar">
                            <i data-lucide="edit-3" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function openClientForm(id) { 
            document.getElementById('client-form-container').classList.remove('hidden'); 
            if(id) {
                const c = STATE.clients.find(x => String(x.id) === String(id));
                if(c) {
                    document.getElementById('cli-id').value = c.id;
                    document.getElementById('cli-name').value = c.name;
                    document.getElementById('cli-phone').value = c.phone;
                    document.getElementById('cli-doc').value = c.doc;
                    document.getElementById('cli-addr').value = c.address;
                }
            } else {
                document.getElementById('cli-id').value = '';
                document.getElementById('cli-name').value = '';
                document.getElementById('cli-phone').value = '';
                document.getElementById('cli-doc').value = '';
                document.getElementById('cli-addr').value = '';
            }
        }

        async function saveClient(e) {
            e.preventDefault();
            showLoading(true);
            const isNew = !document.getElementById('cli-id').value;
            const newId = isNew ? getNextId(STATE.clients) : document.getElementById('cli-id').value;

            const payload = {
                id: newId, nome: document.getElementById('cli-name').value, telefone: document.getElementById('cli-phone').value,
                documento: document.getElementById('cli-doc').value, endereco: document.getElementById('cli-addr').value
            };

            const { error } = await sb.from('clientes').upsert(payload);
            if(error) { showLoading(false); return showToast("Erro: " + error.message, true); }
            
            document.getElementById('client-form-container').classList.add('hidden');
            showToast("Cliente Salvo!");
            loadData();
        }

        function fazerLogout() {
            localStorage.removeItem('rv_user');
            window.location.replace('index.html');
        }

    </script>
  </body>
</html>
