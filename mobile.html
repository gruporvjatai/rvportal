<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERP Mobile - RV PORTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="RV Portal Madeiras">
    <meta name="apple-mobile-web-app-title" content="RV Portal Madeiras">
    <meta name="theme-color" content="#0f172a"> 
    <link rel="manifest" href="manifest.json"> 

    <style>
      body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; }
      
      .border { border-width: 1px !important; border-style: solid !important; border-color: #e2e8f0 !important; }
      
      .hidden-section { display: none !important; }
      .active-section { display: block !important; animation: fadeIn 0.3s ease-in-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .loader { border: 3px solid #e2e8f0; border-top: 3px solid #059669; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      ::-webkit-scrollbar { width: 0px; background: transparent; }

      .nav-active { color: #059669 !important; }
      .nav-active span { font-weight: 900; }

      /* Estilos para o PDF oculto na tela */
      .invoice-full { border: 1px solid #000; min-height: 27.5cm; background-color: transparent !important; position: relative; z-index: 1; font-family: 'Helvetica', 'Arial', sans-serif; color: #1e293b; padding: 15px; background: white;}
      .invoice-full::before { content: ""; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; height: 450px; background-image: url('https://i.postimg.cc/52cvrkkP/LOGRVPORTAL.png'); background-size: contain; background-position: center; background-repeat: no-repeat; opacity: 0.1; z-index: -1; }
      .header-section { display: flex; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
      .logo-area { width: 120px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #e2e8f0; padding-right: 15px; margin-right: 15px; }
      .company-details { flex: 1; }
      .company-title { font-size: 20px; font-weight: 800; color: #059669; margin: 0; }
      .company-info { font-size: 11px; color: #475569; margin-top: 5px; }
      .doc-meta { width: 180px; text-align: right; }
      .doc-title { font-size: 16px; font-weight: 900; color: #0f172a; margin-bottom: 5px; }
      .meta-row { font-size: 11px; margin-bottom: 2px; }
      .info-grid { display: flex; gap: 20px; margin-bottom: 20px; }
      .info-col { flex: 1; border: 1px solid #000; border-radius: 6px; overflow: hidden; }
      .col-header { background-color: #f1f5f9; padding: 5px 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #64748b; border-bottom: 1px solid #000; }
      .col-content { padding: 10px; font-size: 11px; line-height: 1.5; }
      .full-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px; }
      .full-table th { background-color: #0f172a; color: white; padding: 8px; text-align: left; }
      .full-table td { border-bottom: 1px solid #000; padding: 8px; }
      .footer-section { display: flex; gap: 30px; margin-top: 10px; }
      .notes-area { flex: 1; border: 1px dashed #cbd5e1; padding: 10px; border-radius: 6px; }
      .notes-title { font-size: 10px; font-weight: bold; margin-bottom: 5px; color: #64748b; }
      .notes-text { font-size: 10px; color: #334155; }
      .totals-area { width: 250px; }
      .total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 11px; border-bottom: 1px solid #e2e8f0; }
      .total-row.final { border-bottom: none; border-top: 2px solid #0f172a; font-size: 14px; font-weight: 900; background-color: #f1f5f9; padding: 10px; margin-top: 5px; }
    </style>
  </head>
  <body class="text-slate-800 pb-20">

    <header class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border-2 border-emerald-500 bg-white overflow-hidden p-0.5 flex items-center justify-center">
                <img src="https://i.postimg.cc/52cvrkkP/LOGRVPORTAL.png" class="w-full h-full object-contain" />
            </div>
            <h1 class="text-lg font-black tracking-wider text-emerald-400">RV PORTAL</h1>
        </div>
        <button onclick="fazerLogout()" class="text-red-400 hover:text-red-300 p-2"><i data-lucide="log-out"></i></button>
    </header>

    <div id="loading" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center">
       <div class="bg-white p-6 rounded-2xl flex flex-col items-center shadow-2xl"><div class="loader mb-4"></div><span class="font-bold text-slate-700 mt-2">Processando...</span></div>
    </div>
    
    <div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm z-50 transition-all text-center min-w-[250px]"></div>

    <main class="p-4 overflow-x-hidden">

     <div id="view-quotes" class="hidden-section">
          <div class="flex justify-between items-center mb-4">
              <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2"><i data-lucide="folder-open" class="text-indigo-600"></i> Registros</h2>
              <button onclick="openNewQuote()" class="bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-xl font-bold shadow-lg shadow-indigo-200 flex items-center gap-2 active:scale-95 transition-transform"><i data-lucide="plus"></i> Novo</button>
          </div>
          
          <div class="flex bg-slate-200 p-1 rounded-xl mb-4">
              <button id="tab-orcamentos" onclick="setDocType('orcamento')" class="flex-1 py-2 rounded-lg text-sm font-black bg-white text-indigo-600 shadow-sm transition-all">Orçamentos</button>
              <button id="tab-vendas" onclick="setDocType('venda')" class="flex-1 py-2 rounded-lg text-sm font-bold text-slate-500 transition-all">Vendas</button>
          </div>

          <div class="flex flex-col gap-3 mb-4">
              <div class="flex flex-col gap-2">
                  <div class="relative w-full">
                      <i data-lucide="search" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                      <input type="text" id="quote-search" placeholder="Buscar cliente..." class="w-full pl-10 p-3 border rounded-xl text-sm focus:ring-2 focus:ring-indigo-600 outline-none shadow-sm font-medium bg-white" onkeyup="renderQuotesList()">
                  </div>
                  <select id="quote-status-filter" class="w-full p-3 border rounded-xl text-sm focus:ring-2 focus:ring-indigo-600 outline-none shadow-sm font-bold text-slate-600 bg-white" onchange="renderQuotesList()">
                      <option value="">Todos os Status</option>
                      <option value="ABERTO">Abertos</option>
                      <option value="EM NEGOCIAÇÃO">Em Negociação</option>
                      <option value="APROVADO">Aprovados</option>
                      <option value="PERDIDO">Perdidos</option>
                  </select>
              </div>
          </div>
          
          <div id="quotes-list" class="flex flex-col gap-3"></div>
      </div>

     <div id="view-reports" class="hidden-section">
        <h2 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-2"><i data-lucide="file-text" class="text-emerald-600"></i> Relatórios</h2>
        
        <div class="flex flex-col gap-4">
            <button onclick="showDailyReport()" class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden flex items-center justify-between active:scale-95 transition-transform text-left w-full">
                <div>
                    <h3 class="text-base font-black text-slate-800 mb-1">Faturamento do Dia</h3>
                    <p class="text-xs text-slate-500 font-medium">Resumo de vendas de hoje.</p>
                </div>
                <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center shrink-0">
                    <i data-lucide="sun" class="w-6 h-6"></i>
                </div>
            </button>
            
            <button onclick="openPeriodReportModal()" class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden flex items-center justify-between active:scale-95 transition-transform text-left w-full">
                <div>
                    <h3 class="text-base font-black text-slate-800 mb-1">Vendas por Período</h3>
                    <p class="text-xs text-slate-500 font-medium">Filtros de data e pagamento.</p>
                </div>
                <div class="w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center shrink-0">
                    <i data-lucide="calendar-search" class="w-6 h-6"></i>
                </div>
            </button>
        </div>
    </div>

      <div id="view-prod" class="hidden-section">
          <div class="flex justify-between items-center mb-4">
              <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2"><i data-lucide="package" class="text-orange-500"></i> Produtos</h2>
              <button onclick="openProductForm()" class="bg-orange-500 hover:bg-orange-600 text-white p-3 rounded-xl font-bold shadow-lg shadow-orange-200 flex items-center gap-2 active:scale-95 transition-transform"><i data-lucide="plus"></i> Novo</button>
          </div>
          
          <div class="flex flex-col gap-2 mb-4">
              <div class="relative w-full">
                  <i data-lucide="search" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                  <input type="text" id="prod-search" placeholder="Buscar produto..." class="w-full pl-10 p-3 border rounded-xl text-sm outline-none focus:border-orange-500 font-medium bg-white" onkeyup="renderProducts()">
              </div>
              <select id="prod-category" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-orange-500 font-bold text-slate-600 bg-white" onchange="renderProducts()">
                  <option value="">Todas as Categorias</option>
              </select>
          </div>

          <div id="prod-list" class="flex flex-col gap-3"></div>
      </div>

      <div id="view-clients" class="hidden-section">
          <div class="flex justify-between items-center mb-4">
              <h2 class="text-2xl font-black text-slate-800 flex items-center gap-2"><i data-lucide="users" class="text-blue-500"></i> Clientes</h2>
              <button onclick="openClientForm()" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold shadow-lg shadow-blue-200 flex items-center gap-2 active:scale-95 transition-transform"><i data-lucide="plus"></i> Novo</button>
          </div>
          
          <div class="mb-4">
              <div class="relative w-full">
                  <i data-lucide="search" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                  <input type="text" id="cli-search" placeholder="Buscar por nome, telefone ou doc..." class="w-full pl-10 p-3 border rounded-xl outline-none focus:border-blue-600 font-medium bg-white shadow-sm" onkeyup="renderClients()">
              </div>
          </div>

          <div id="clients-list" class="flex flex-col gap-2"></div>
      </div>

    </main>

    <div id="view-pos" class="hidden fixed inset-0 bg-slate-50 z-[60] flex-col animate-[fadeIn_0.2s]">
        <div class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="closeNewQuote()" class="text-white p-2 bg-slate-800 rounded-full hover:bg-slate-700 active:scale-95"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <h2 class="text-lg font-black tracking-wider text-white">ORÇAMENTO</h2>
            </div>
            <span id="edit-mode-indicator" class="hidden text-[10px] bg-emerald-500 text-white px-2 py-1 rounded font-bold uppercase">Editando</span>
        </div>

        <div class="flex-1 overflow-y-auto p-4 pb-32">
            <button onclick="openPosProductModal()" class="w-full bg-indigo-100 text-indigo-700 p-4 rounded-xl font-bold mb-4 flex items-center justify-center gap-2 border border-indigo-200 active:scale-95 transition-transform"><i data-lucide="search"></i> Buscar e Adicionar Produtos</button>

            <div class="bg-white rounded-xl border border-slate-200 shadow-sm mb-4 overflow-hidden">
                <div class="bg-slate-50 p-3 border-b border-slate-200 font-bold text-slate-700 text-sm flex justify-between items-center">
                    <span>Itens Adicionados</span> 
                    <button onclick="clearCart()" class="text-red-500 text-xs border border-red-200 px-2 py-1 rounded bg-white">LIMPAR</button>
                </div>
                <div id="pos-cart-items" class="p-3 flex flex-col gap-3"></div>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 space-y-4">
                <div>
                    <input type="hidden" id="pos-client" value="">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Cliente</label>
                    <button id="pos-client-btn" onclick="openPosClientModal()" class="w-full p-3 border rounded-xl text-left font-bold text-slate-700 flex justify-between items-center bg-slate-50">
                        <span>Consumidor Final</span>
                        <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                    </button>
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Forma de Pagto Base</label>
                    <select id="pos-payment" class="w-full p-3 border rounded-xl text-sm bg-slate-50 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500">
                        <option>Dinheiro</option>
                              <option>PIX</option>
                              <option>Carteira</option>
                              <option>Cartão Débito</option>
                              <option>Cartão Crédito</option>
                              <option>Boleto 21 dias</option>
                              <option>Boleto 30 dias</option>
                              <option>Boleto Programado</option>
                              <option>Cheque</option>
                            </select>
                </div>
                <div class="flex gap-2">
                    <div class="w-1/3">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Tipo Desc.</label>
                        <select id="pos-discount-type" class="w-full p-3 border rounded-xl text-sm bg-slate-50 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500" onchange="renderCart()">
                            <option value="%">%</option><option value="$">R$</option>
                        </select>
                    </div>
                    <div class="w-2/3">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Desconto</label>
                        <input type="number" id="pos-discount" value="0" class="w-full p-3 border rounded-xl text-sm bg-slate-50 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500" onchange="renderCart()">
                    </div>
                </div>
                
                <div class="pt-2">
                    <div class="flex items-center gap-2 mb-2">
                        <input type="checkbox" id="pos-custom-address-check" class="w-4 h-4 text-indigo-600 rounded" onchange="toggleCustomAddress()">
                        <label for="pos-custom-address-check" class="text-xs font-bold text-slate-600">Endereço de Entrega Manual</label>
                    </div>
                    <textarea id="pos-custom-address" class="hidden w-full p-3 border rounded-xl text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500 resize-none" rows="2" placeholder="Digite o endereço completo..."></textarea>
                </div>

                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <input type="checkbox" id="pos-custom-obs-check" class="w-4 h-4 text-indigo-600 rounded" onchange="toggleCustomObs()">
                        <label for="pos-custom-obs-check" class="text-xs font-bold text-slate-600">Observações Extras</label>
                    </div>
                    <textarea id="pos-custom-obs" class="hidden w-full p-3 border rounded-xl text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500 resize-none" rows="2" placeholder="Digite as observações gerais..."></textarea>
                </div>
            </div>
        </div>

        <div class="bg-white border-t p-4 shrink-0 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)]">
            <div class="flex justify-between items-end mb-3 px-1">
                <span class="text-xs font-bold text-slate-500">Total (<span id="cart-count">0</span> itens)</span>
                <span id="pos-total-display" class="text-2xl font-black text-slate-800">R$ 0,00</span>
            </div>
            <button onclick="saveQuote()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold text-lg shadow-lg shadow-indigo-200 active:scale-95 transition-transform flex justify-center items-center gap-2">
                <i data-lucide="save"></i> Salvar Orçamento
            </button>
        </div>
    </div>

    <div id="view-report-result" class="hidden fixed inset-0 bg-slate-50 z-[90] flex-col animate-[fadeIn_0.2s]">
        <div class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md shrink-0">
            <div class="flex items-center gap-3">
                <button type="button" onclick="closeReportView()" class="text-white p-2 bg-slate-800 rounded-full hover:bg-slate-700 active:scale-95 cursor-pointer z-50">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
                <h2 class="text-lg font-black tracking-wider text-white">RELATÓRIO</h2>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 bg-slate-100" id="report-result-content">
        </div>
    </div>

    <div id="pos-product-modal" class="hidden fixed inset-0 bg-slate-900 z-[70] flex-col animate-[fadeIn_0.2s]">
        <div class="p-4 border-b flex justify-between items-center bg-white shrink-0">
            <h3 class="font-black text-lg text-slate-800 flex items-center gap-2"><i data-lucide="package-search" class="text-indigo-600"></i> Produtos</h3>
            <button onclick="closePosProductModal()" class="text-slate-400 hover:text-red-500 p-2 bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <div class="p-4 bg-white border-b shrink-0">
            <div class="relative w-full">
                <i data-lucide="search" class="absolute left-3 top-3.5 text-slate-400 w-5 h-5"></i>
                <input type="text" id="pos-modal-search" placeholder="Digite o nome..." class="w-full pl-10 p-3 border-2 border-slate-200 rounded-xl font-bold outline-none focus:border-indigo-600" onkeyup="renderPosProductModal()">
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 bg-slate-50">
            <div id="pos-modal-grid" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <div id="pos-client-modal" class="hidden fixed inset-0 bg-slate-900 z-[70] flex-col animate-[fadeIn_0.2s]">
        <div class="p-4 border-b flex justify-between items-center bg-white shrink-0">
            <h3 class="font-black text-lg text-slate-800 flex items-center gap-2"><i data-lucide="users" class="text-indigo-600"></i> Selecionar Cliente</h3>
            <button onclick="closePosClientModal()" class="text-slate-400 hover:text-red-500 p-2 bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <div class="p-4 bg-white border-b shrink-0">
            <div class="relative w-full">
                <i data-lucide="search" class="absolute left-3 top-3.5 text-slate-400 w-5 h-5"></i>
                <input type="text" id="pos-client-modal-search" placeholder="Buscar por nome, telefone..." class="w-full pl-10 p-3 border-2 border-slate-200 rounded-xl font-bold outline-none focus:border-indigo-600" onkeyup="renderPosClientModal()">
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 bg-slate-50">
            <div id="pos-client-modal-grid" class="flex flex-col gap-3"></div>
        </div>
        <div class="p-4 bg-white border-t shrink-0">
            <button onclick="selectPosClient('', 'Consumidor Final')" class="w-full py-4 bg-slate-200 text-slate-700 font-bold rounded-xl active:scale-95 transition-transform">Consumidor Final (Remover)</button>
        </div>
    </div>

    <div id="modal-period-report" class="hidden fixed inset-0 bg-slate-900/70 z-[80] flex items-center justify-center p-4 animate-[fadeIn_0.2s]">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl flex flex-col overflow-hidden">
        <div class="p-4 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-black text-slate-800 text-lg flex items-center gap-2"><i data-lucide="calendar-search" class="text-indigo-600 w-5 h-5"></i> Gerar Relatório</h3>
            <button onclick="closePeriodReportModal()" class="text-slate-400 hover:text-red-500 bg-white rounded-full p-1"><i data-lucide="x"></i></button>
        </div>
        <div class="p-5 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Data Início</label>
                    <input type="date" id="rep-per-start" class="w-full p-3 border rounded-xl bg-slate-50 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Data Fim</label>
                    <input type="date" id="rep-per-end" class="w-full p-3 border rounded-xl bg-slate-50 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Forma de Pagto</label>
                <select id="rep-per-payment" class="w-full p-3 border rounded-xl bg-slate-50 font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="Todos">Todos</option>
                    <option>Dinheiro</option><option>PIX</option><option>Carteira</option>
                    <option>Cartão Débito</option><option>Cartão Crédito</option>
                    <option>Boleto 21 dias</option><option>Boleto 30 dias</option>
                    <option>Boleto Programado</option><option>Cheque</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Cliente (Opcional)</label>
                <input type="text" id="rep-per-client" placeholder="Ex: João da Silva" class="w-full p-3 border rounded-xl bg-slate-50 font-medium text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        </div>
        <div class="p-4 border-t bg-slate-50 flex gap-3">

    <script>
        function toLocalYYYYMMDD(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        let dadosUsuario = null;
        const userSessao = localStorage.getItem('rv_user');

        if (!userSessao) { window.location.replace('index.html'); } 
        else { dadosUsuario = JSON.parse(userSessao); }

        const supabaseUrl = 'https://lyieiqhkspbowsrlngvn.supabase.co'; 
        const supabaseKey = 'sb_publishable_B2a4vA22qf4XGcrxPDRAaw_13rW51uI';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        let STATE = { products: [], clients: [], logs: [], quotes: [], expenses: [], users: [], sales: [] };
        
        let CART = [];
        let CURRENT_QUOTE_ID = null;
        let currentDocType = 'orcamento';

        window.onload = function() { 
            if (dadosUsuario) {
                showLoading(true); 
                loadData(); 
            }
        };

        function navigate(viewId) {
            document.querySelectorAll('main > div[id^="view-"]').forEach(el => { el.classList.add('hidden-section'); el.classList.remove('active-section'); });
            
            const target = document.getElementById('view-' + viewId);
            if(target) { target.classList.remove('hidden-section'); target.classList.add('active-section'); }
            
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('nav-active');
            });
            
            const activeBtn = document.getElementById('nav-' + viewId);
            if(activeBtn) activeBtn.classList.add('nav-active');
            
            if(viewId === 'quotes') renderQuotesList();            
            if(viewId === 'prod') renderProducts();
            if(viewId === 'clients') renderClients();
            
            lucide.createIcons();
            window.scrollTo(0, 0); 
        }

        function formatMoney(val) { return parseFloat(val || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
        
        function formatDate(d) { 
            try { 
                if (!d) return '-';
                const safeDate = (typeof d === 'string' && d.length === 10) ? d + 'T00:00:00' : d;
                return new Date(safeDate).toLocaleDateString('pt-BR'); 
            } catch(e) { return '-'; } 
        }

        function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }
        
        function showToast(msg, isError) { 
            const t = document.getElementById('toast'); 
            t.textContent = msg; 
            t.className = `fixed top-24 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm z-[100] transition-all text-center min-w-[250px] ${isError ? 'bg-red-600' : 'bg-slate-900'}`; 
            t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 3000); 
        }

        function getNextId(array1, array2 = []) {
            let max = 0;
            array1.forEach(item => { const val = parseInt(item.id); if(!isNaN(val) && val > max) max = val; });
            array2.forEach(item => { const val = parseInt(item.id); if(!isNaN(val) && val > max) max = val; });
            return max + 1;
        }

        async function fetchAllRecords(table) {
            let allRecords = [];
            let from = 0;
            const step = 1000;
            let keepFetching = true;

            while (keepFetching) {
                const { data, error } = await sb.from(table).select('*').range(from, from + step - 1);
                if (error) throw error;
                if (data && data.length > 0) {
                    allRecords.push(...data);
                    if (data.length < step) keepFetching = false;
                    else from += step;
                } else {
                    keepFetching = false;
                }
            }
            return { data: allRecords };
        }

        async function loadData() {
            try {
                const [resProd, resCli, resLog, resDesp] = await Promise.all([
                    fetchAllRecords('produtos'), fetchAllRecords('clientes'),
                    fetchAllRecords('logs'), fetchAllRecords('despesas')
                ]);

                STATE.products = (resProd.data || []).map(p => ({
                    id: p.id, name: p.nome, category: p.categoria, price: Number(p.preco),
                    cost: Number(p.custo) || 0, stock: Number(p.estoque_fisico), 
                    committed: Number(p.estoque_comprometido),
                    available: Number(p.estoque_fisico) - Number(p.estoque_comprometido)
                }));

                STATE.clients = (resCli.data || []).map(c => ({
                    id: c.id, name: c.nome, phone: c.telefone, doc: c.documento, address: c.endereco
                }));

                STATE.logs = [];
                const quotesMap = {};
                const salesMap = {};
                
                (resLog.data || []).forEach(l => {
                    if (l.tipo === 'orcamento') {
                        const qId = String(l.id);
                        if(!quotesMap[qId]) {
                            quotesMap[qId] = { 
                                id: qId, date: l.data, clientName: l.cliente_nome, items: [], total: 0, 
                                status: l.status || 'ABERTO', discount: Number(l.desconto), discountType: l.status_financeiro || '$', 
                                paymentMethod: l.forma_pagamento, deliveryAddress: l.endereco_entrega, observacao: l.observacao
                            };
                        }
                        const unitPrice = Number(l.quantidade) > 0 ? Number(l.valor_total) / Number(l.quantidade) : 0;
                        quotesMap[qId].items.push({ name: l.produto_nome, qty: Number(l.quantidade), price: unitPrice, total: Number(l.valor_total), uid: l.uid });
                        quotesMap[qId].total += Number(l.valor_total);
                        
                    } else if (l.tipo === 'venda') {
                        const qId = String(l.id);
                        if(!salesMap[qId]) {
                            salesMap[qId] = { 
                                id: qId, date: l.data, clientName: l.cliente_nome, items: [], total: 0, 
                                status: l.status, discount: Number(l.desconto), discountType: l.status_financeiro || '$', 
                                paymentMethod: l.forma_pagamento, deliveryAddress: l.endereco_entrega, observacao: l.observacao
                            };
                        }
                        const unitPrice = Number(l.quantidade) > 0 ? Number(l.valor_total) / Number(l.quantidade) : 0;
                        salesMap[qId].items.push({ name: l.produto_nome, qty: Number(l.quantidade), price: unitPrice, total: Number(l.valor_total), uid: l.uid });
                        salesMap[qId].total += Number(l.valor_total);
                    }
                    
                    if (l.tipo !== 'orcamento') {
                        STATE.logs.push({
                            uid: l.uid, id: l.id, type: l.tipo, productName: l.produto_nome, quantity: Number(l.quantidade),
                            date: l.data, note: l.observacao, totalValue: Number(l.valor_total),
                            clientName: l.cliente_nome, paymentMethod: l.forma_pagamento, status: l.status,
                            finStatus: l.status_financeiro, dueDate: l.vencimento, paidValue: Number(l.valor_pago),
                            discount: Number(l.desconto)
                        });
                    }
                });
                
                STATE.quotes = Object.values(quotesMap).map(q => { q.itemsText = q.items.map(i => `${i.qty}x ${i.name}`).join(', '); return q; });
                STATE.sales = Object.values(salesMap).map(s => { s.itemsText = s.items.map(i => `${i.qty}x ${i.name}`).join(', '); return s; });
                
                STATE.expenses = (resDesp.data || []).map(e => ({
                    id: e.id, item: e.item, quantity: Number(e.quantidade), cost: Number(e.custo), 
                    date: e.data, status: e.status || 'PENDENTE'
                }));

                onDataLoaded();
            } catch (err) {
                showLoading(false);
                showToast("Erro de conexão", true);
                console.error(err);
            }
        }

        function onDataLoaded() {
            if(!document.querySelector('.active-section')) {
                navigate('quotes'); 
            } else {
                const current = document.querySelector('.active-section').id.replace('view-','');
                navigate(current);
            }
            showLoading(false);
        }

        function openNewQuote() {
            clearCart();
            document.getElementById('view-pos').classList.remove('hidden');
            document.getElementById('view-pos').classList.add('flex');
            renderCart();
        }

        function closeNewQuote() {
            document.getElementById('view-pos').classList.add('hidden');
            document.getElementById('view-pos').classList.remove('flex');
        }

        function toggleCustomAddress() {
            const check = document.getElementById('pos-custom-address-check').checked;
            const input = document.getElementById('pos-custom-address');
            if(check) {
                input.classList.remove('hidden');
                input.focus();
            } else {
                input.classList.add('hidden');
                input.value = '';
            }
        }

        function toggleCustomObs() {
            const check = document.getElementById('pos-custom-obs-check').checked;
            const input = document.getElementById('pos-custom-obs');
            if(check) {
                input.classList.remove('hidden');
                input.focus();
            } else {
                input.classList.add('hidden');
                input.value = '';
            }
        }

        function calculateTotal() {
            const sub = CART.reduce((a,b)=>a+(b.qty * b.price), 0);
            const type = document.getElementById('pos-discount-type').value;
            const val = parseFloat(document.getElementById('pos-discount').value) || 0;
            let disc = (type === '%') ? (sub * (val/100)) : val;
            return { sub, disc, total: Math.max(0, sub - disc) };
        }

        function renderCart() {
            const box = document.getElementById('pos-cart-items');
            document.getElementById('edit-mode-indicator').style.display = CURRENT_QUOTE_ID ? 'inline-block' : 'none';
            
            if(!CART.length) { 
                box.innerHTML='<p class="text-center text-slate-400 my-4 text-sm font-bold">Nenhum item adicionado</p>'; 
                document.getElementById('pos-total-display').innerText=formatMoney(0); 
                document.getElementById('cart-count').innerText='0'; 
                return; 
            }
            
            const totals = calculateTotal();
            
            box.innerHTML = CART.map((i, idx) => `
                <div class="bg-white p-3 border rounded-xl flex flex-col gap-2">
                    <div class="flex justify-between items-start">
                        <span class="font-bold text-sm text-slate-800 leading-tight pr-2">${i.name}</span>
                        <button onclick="CART.splice(${idx},1);renderCart()" class="text-red-400 hover:text-red-600 bg-red-50 p-1.5 rounded-lg active:scale-95 transition-transform"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                    <div class="flex justify-between items-center mt-1">
                        <div class="flex items-center gap-2">
                            <input type="number" value="${i.qty}" step="0.1" onchange="updateCartItem(${idx}, 'qty', this.value)" class="w-16 p-2 border rounded-lg bg-slate-50 text-center text-sm font-bold focus:border-indigo-500 outline-none" title="Qtd">
                            <span class="text-slate-400 text-xs font-bold">x</span>
                            <input type="number" step="0.01" value="${i.price}" onchange="updateCartItem(${idx}, 'price', this.value)" class="w-20 p-2 border rounded-lg bg-slate-50 text-center text-sm font-bold focus:border-indigo-500 outline-none" title="Unit.">
                        </div>
                        <div class="font-black text-slate-800 text-base">${formatMoney(i.total)}</div>
                    </div>
                </div>`).join('');
                
            document.getElementById('pos-total-display').innerText = formatMoney(totals.total);
            document.getElementById('cart-count').innerText = CART.length;
            lucide.createIcons();
        }

        function updateCartItem(idx, field, value) {
            const item = CART[idx];
            if(field === 'qty') item.qty = parseFloat(value) || 0;
            else if (field === 'price') item.price = parseFloat(value) || 0;
            item.total = item.qty * item.price;
            renderCart();
        }

        function clearCart() { 
            CART=[]; 
            CURRENT_QUOTE_ID=null; 
            document.getElementById('pos-discount').value=0; 
            
            document.getElementById('pos-client').value = '';
            document.getElementById('pos-client-btn').querySelector('span').innerText = 'Consumidor Final';
            
            document.getElementById('pos-custom-address-check').checked = false;
            document.getElementById('pos-custom-address').classList.add('hidden');
            document.getElementById('pos-custom-address').value = '';

            document.getElementById('pos-custom-obs-check').checked = false;
            document.getElementById('pos-custom-obs').classList.add('hidden');
            document.getElementById('pos-custom-obs').value = '';
            
            renderCart(); 
        }

            document.getElementById('pos-product-modal').classList.remove('hidden');
            document.getElementById('pos-product-modal').classList.add('flex');
            document.getElementById('pos-modal-search').value = '';
            renderPosProductModal();
        }

            document.getElementById('pos-product-modal').classList.add('hidden');
            document.getElementById('pos-product-modal').classList.remove('flex');
        }

        function renderPosProductModal() {
            const term = document.getElementById('pos-modal-search').value.toLowerCase();
            const grid = document.getElementById('pos-modal-grid');
            if(!grid) return;

            const sortedProducts = (STATE.products||[]).slice().sort((a, b) => Number(a.id) - Number(b.id));

            grid.innerHTML = sortedProducts.filter(p=>p.name.toLowerCase().includes(term)).map(p => {
                return `
                <div class="p-3 border rounded-xl bg-white flex flex-col gap-2">
                    <div class="flex justify-between">
                        <h4 class="font-bold text-sm text-slate-800 leading-tight">${p.name}</h4>
                        <span class="text-[10px] px-2 py-0.5 rounded h-max ${p.available<=0?'bg-red-100 text-red-600':'bg-emerald-100 text-emerald-700'} font-bold">Disp: ${p.available}</span>
                    </div>
                    <div class="flex items-center justify-between mt-1">
                        <span class="text-indigo-600 font-black text-lg">${formatMoney(p.price)}</span>
                        <div class="flex gap-2">
                            <input type="number" id="qty-modal-${p.id}" value="1" min="0.1" step="0.1" class="w-16 p-2 border rounded-lg text-center font-bold outline-none focus:ring-2 focus:ring-indigo-600 bg-slate-50">
                            <button onclick="addModalToCart('${p.id}')" class="bg-indigo-600 text-white p-2 rounded-lg font-bold shadow-md shadow-indigo-200 active:scale-95 transition-transform"><i data-lucide="plus" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function addModalToCart(id) {
            const p = STATE.products.find(x=>x.id==id);
            const qtyInput = document.getElementById(`qty-modal-${id}`);
            const qty = parseFloat(qtyInput.value) || 1;
            
            if(p) {
                const existing = CART.find(x=>x.prodId==id);
                if(existing) { 
                    existing.qty += qty; 
                    existing.total = existing.qty * existing.price; 
                } else { 
                    CART.push({prodId:p.id, name:p.name, price:p.price, qty:qty, total:p.price * qty}); 
                }
                renderCart();
                qtyInput.value = "1";
                showToast(p.name + " adicionado!");
            }
        }

            document.getElementById('pos-client-modal').classList.add('flex');

            renderPosClientModal();
        }

            document.getElementById('pos-client-modal').classList.add('hidden');
            document.getElementById('pos-client-modal').classList.remove('flex');
        }

        function renderPosClientModal() {
            const term = document.getElementById('pos-client-modal-search').value.toLowerCase();
            const grid = document.getElementById('pos-client-modal-grid');
            if(!grid) return;

            const sortedClients = (STATE.clients||[]).slice().sort((a, b) => a.name.localeCompare(b.name));

            let filtered = sortedClients;
            if (term) {
                filtered = filtered.filter(c => 
                    c.name.toLowerCase().includes(term) || 
                    (c.doc && c.doc.includes(term)) || 
                    (c.phone && c.phone.includes(term))
                );
            }

            grid.innerHTML = filtered.slice(0, 50).map(c => {

                        <span class="text-[11px] text-slate-500 font-medium mt-0.5">Doc: ${c.doc || '-'} | Tel: ${c.phone || '-'}</span>
                    </div>
                    <button class="bg-indigo-50 text-indigo-600 p-2 rounded-full"><i data-lucide="check" class="w-5 h-5"></i></button>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        async function saveQuote() {
            if(!CART.length) return showToast("Adicione produtos primeiro!", true);
            showLoading(true);

            const totals = calculateTotal();
            const cliId = document.getElementById('pos-client').value;
            const clientName = STATE.clients.find(c=>c.id==cliId)?.name || "Consumidor Final";
            
            const customAddrCheck = document.getElementById('pos-custom-address-check').checked;
            const deliveryAddr = customAddrCheck ? document.getElementById('pos-custom-address').value : '';
            
            const customObsCheck = document.getElementById('pos-custom-obs-check').checked;
            const obs = customObsCheck ? document.getElementById('pos-custom-obs').value : '';

            const date = new Date().toISOString();
            const budgetId = CURRENT_QUOTE_ID || getNextId(STATE.logs, STATE.quotes);

            if(CURRENT_QUOTE_ID) await sb.from('logs').delete().eq('id', CURRENT_QUOTE_ID).eq('tipo', 'orcamento');

            let quotesToInsert = CART.map(item => ({
                id: budgetId, tipo: 'orcamento', produto_nome: item.name, quantidade: item.qty,
                data: date, observacao: obs, valor_total: item.total, cliente_nome: clientName, 
                forma_pagamento: document.getElementById('pos-payment').value, status: 'ABERTO', 
                desconto: totals.disc, status_financeiro: document.getElementById('pos-discount-type').value, 
                endereco_entrega: deliveryAddr, status_entrega: '', qtd_entregue: 0, vencimento: date, valor_pago: 0
            }));

            const { error } = await sb.from('logs').insert(quotesToInsert);
            if(error) { showLoading(false); return showToast("Erro: " + error.message, true); }

            clearCart();
            closeNewQuote();
            showToast("Orçamento Salvo!");
            await loadData();
        }

        function loadQuoteToCart(id) {
            let q = STATE.quotes.find(x => String(x.id) === String(id));
            if(!q) q = STATE.sales.find(x => String(x.id) === String(id));
            if(!q) return;
            
            CART = JSON.parse(JSON.stringify(q.items));
            CURRENT_QUOTE_ID = q.id; 
            
            const clientSelectBtn = document.getElementById('pos-client-btn').querySelector('span');
            const clientObj = STATE.clients.find(c => String(c.name).trim() === String(q.clientName).trim());
            
            if(clientObj) {
                document.getElementById('pos-client').value = clientObj.id;
                clientSelectBtn.innerText = clientObj.name;
            } else {
                document.getElementById('pos-client').value = '';
                clientSelectBtn.innerText = q.clientName || 'Consumidor Final';
            }
            
            document.getElementById('pos-payment').value = q.paymentMethod || 'Dinheiro';
            document.getElementById('pos-discount-type').value = q.discountType || '$';

            // CORREÇÃO: Se era porcentagem, o valor salvo é o desconto final em reais.
            // Para editar, convertemos o R$ de volta para o número da %.
            if(q.discountType === '%') {
                document.getElementById('pos-discount').value = q.total > 0 ? ((Number(q.discount) / q.total) * 100).toFixed(2) : 0;
            } else {
                document.getElementById('pos-discount').value = q.discount || 0;
            }

            if(q.deliveryAddress) {
                document.getElementById('pos-custom-address-check').checked = true;
                document.getElementById('pos-custom-address').classList.remove('hidden');
                document.getElementById('pos-custom-address').value = q.deliveryAddress;
            } else {
                document.getElementById('pos-custom-address-check').checked = false;
                document.getElementById('pos-custom-address').classList.add('hidden');
                document.getElementById('pos-custom-address').value = '';
            }

            if(q.observacao) {
                document.getElementById('pos-custom-obs-check').checked = true;
                document.getElementById('pos-custom-obs').classList.remove('hidden');
                document.getElementById('pos-custom-obs').value = q.observacao;
            } else {
                document.getElementById('pos-custom-obs-check').checked = false;
                document.getElementById('pos-custom-obs').classList.add('hidden');
                document.getElementById('pos-custom-obs').value = '';
            }

            document.getElementById('view-pos').classList.remove('hidden');
            document.getElementById('view-pos').classList.add('flex');
            renderCart();
            showToast(`Editando Registro #${q.id}`);
        }

        async function updateQuoteStatus(id, newStatus) {
            showLoading(true);
            const { error } = await sb.from('logs').update({ status: newStatus }).eq('id', id).eq('tipo', 'orcamento');
            if (error) { showLoading(false); return showToast("Erro: " + error.message, true); }
            const quote = STATE.quotes.find(q => String(q.id) === String(id));
            if (quote) quote.status = newStatus;
            showLoading(false);
            showToast("Status Atualizado!");
            renderQuotesList();

        async function deleteQuote(id) {

        async function shareQuote(id) {

                const itemTotal = i.qty * i.price;

                        <td align="center" style="border-bottom: 1px solid #000; padding: 8px;">${i.qty}</td>

            // CORREÇÃO: O Desconto do banco JÁ ESTÁ EM REAIS!

            const finalTotal = subtotal - valorDesconto;
            
            const addressToShow = q.deliveryAddress ? `ENTREGA: ${q.deliveryAddress}` : (cli.address || 'Não informado');
            const obsText = q.observacao && q.observacao !== 'Venda PDV' && q.observacao !== 'Pronta Entrega PDV' 
                            ? q.observacao : 'Válido por 7 dias. Verifique os produtos no ato da entrega.';

            const tituloDoc = isVenda ? "COMPROVANTE DE VENDA" : "ORÇAMENTO";

            // CORREÇÃO DO LAYOUT PDF: Crio o elemento usando AS SUAS CLASSES em um container isolado!
            const tempDiv = document.createElement('div');
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            tempDiv.style.width = '210mm'; // Força a largura do A4
            tempDiv.innerHTML = `

                    <div class="header-section">
                        <div class="logo-area">

                        </div>
                        <div class="company-details">
                            <h2 class="company-title">RV PORTAL MADEIRAS</h2>
                            <div class="company-info">CNPJ: 30.942.123/0001-02</div>
                            <div class="company-info">Rua Mineiros, 532 | Jataí - GO | (64) 3636-4861</div>
                        </div>
                        <div class="doc-meta">
                            <h2 class="doc-title">${tituloDoc}</h2>
                            <div class="meta-row"><strong>Nº:</strong> ${q.id}</div>
                            <div class="meta-row"><strong>Data:</strong> ${formatDate(q.date)}</div>
                        </div>
                    </div>
                    <div class="info-grid">
                        <div class="info-col">
                            <div class="col-header">Dados do Cliente</div>
                            <div class="col-content">
                                <strong>${cli.name}</strong><br>${cli.doc || ''}<br>${cli.phone || ''}<br>${addressToShow}
                            </div>
                        </div>
                        <div class="info-col">
                            <div class="col-header">Pagamento</div>
                            <div class="col-content">
                                <strong>Forma:</strong> ${q.paymentMethod || 'A Combinar'}<br><strong>Vendedor:</strong> RV PORTAL
                            </div>
                        </div>
                    </div>
                    <table class="full-table">
                        <thead>
                            <tr>
                                <th align="left">Descrição</th>
                                <th align="center" width="50">Qtd</th>
                                <th align="right" width="90">Unit.</th>
                                <th align="right" width="90">Total</th>
                            </tr>
                        </thead>
                        <tbody>${itemsHtml}</tbody>
                    </table>
                    <div class="footer-section">
                        <div class="notes-area">
                            <div class="notes-title">Observações:</div>
                            <div class="notes-text">${obsText}</div>
                        </div>
                        <div class="totals-area">
                            <div class="total-row"><span>Subtotal:</span><span>${formatMoney(subtotal)}</span></div>

                            <div class="total-row final"><span>TOTAL:</span><span>${formatMoney(finalTotal)}</span></div>

                    </div>
                </div>
            `;
            // Anexar ao body para que o html2pdf capture as suas regras de <style>
            document.body.appendChild(tempDiv);

            const filename = `Documento_${q.id}_${clientName.replace(/\s+/g, '_')}.pdf`;
            const opt = {
                margin: 0, 
                filename: filename,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            try {
                // Seleciona a classe "invoice-full" que acabou de ser criada 
                const pdfBlob = await html2pdf().set(opt).from(tempDiv.children[0]).output('blob');
                document.body.removeChild(tempDiv);

        async function estornarVenda(id) {
            if(!confirm("Tem certeza que deseja estornar esta VENDA para ORÇAMENTO? Os produtos retornarão ao estoque!")) return;
            showLoading(true);
            
            const sale = STATE.sales.find(s => String(s.id) === String(id));
            if (!sale) { showLoading(false); return; }

            try {
                for (let item of sale.items) {
                    const prod = STATE.products.find(p => p.name === item.name);
                    if(prod) {
                        const novoEstoque = Number(prod.stock) + Number(item.qty);
                        await sb.from('produtos').update({ estoque_fisico: novoEstoque }).eq('id', prod.id);
                    }
                }

                const { error } = await sb.from('logs').update({ tipo: 'orcamento', status: 'ABERTO' }).eq('id', id).eq('tipo', 'venda');
                if(error) throw error;
                
                showToast("Venda Estornada com sucesso!");
                await loadData(); 
                setDocType('orcamento'); 
            } catch(e) {
                showLoading(false);
                showToast("Erro: " + e.message, true);
            }
        }

        async function duplicarParaOrcamento(id) {
            if(!confirm("Duplicar esta venda como um novo ORÇAMENTO em aberto?")) return;
            showLoading(true);

            const sale = STATE.sales.find(s => String(s.id) === String(id));
            if (!sale) { showLoading(false); return; }

            try {
                const logsToCopy = STATE.logs.filter(l => String(l.id) === String(id) && l.type === 'venda');
                const newId = getNextId(STATE.logs, STATE.quotes);
                const date = new Date().toISOString();

                const newLogs = logsToCopy.map(l => ({
                    id: newId,
                    tipo: 'orcamento',
                    produto_nome: l.productName,
                    quantidade: l.quantity,
                    data: date,
                    observacao: l.note,
                    valor_total: l.totalValue,
                    cliente_nome: l.clientName,
                    forma_pagamento: l.paymentMethod || 'Dinheiro',
                    status: 'ABERTO',
                    desconto: sale.discount || 0,
                    status_financeiro: sale.discountType || '$',
                    endereco_entrega: sale.deliveryAddress || '',
                    status_entrega: '',
                    qtd_entregue: 0,
                    vencimento: date,
                    valor_pago: 0
                }));

                const { error } = await sb.from('logs').insert(newLogs);
                if(error) throw error;

                showToast("Duplicado com Sucesso!");
                await loadData();
                setDocType('orcamento');
            } catch(e) {
                showLoading(false);
                showToast("Erro ao duplicar: " + e.message, true);
            }
        }

        function showDailyReport() {
            showLoading(true);
            
            const dataHojeLocal = new Date().toLocaleDateString('pt-BR');
            let totalVendas = 0;
            let descontos = 0;
            let pagamentosMap = {};
            let rowsHtml = '';
            
            const todayLogs = STATE.logs.filter(l => {
                if (!l.date) return false;
                const dataLogLocal = new Date(l.date).toLocaleDateString('pt-BR');
                return dataLogLocal === dataHojeLocal && l.type === 'venda' && l.status !== 'CANCELADO';
            });

            const salesMap = {};
            
            todayLogs.forEach(l => {
                if (!salesMap[l.id]) {
                    salesMap[l.id] = { id: l.id, clientName: l.clientName || 'Consumidor Final', paymentMethod: l.paymentMethod || 'Não Informado', discount: Number(l.discount) || 0, totalValue: 0, discountType: l.finStatus || '$' };
                }
                salesMap[l.id].totalValue += Number(l.totalValue) || 0;
            });
            
            Object.values(salesMap).forEach(s => {
                
                // CORREÇÃO: Lê o desconto absoluto
                const descValor = Number(s.discount) || 0;
                const valorFinal = s.totalValue - descValor;

                totalVendas += valorFinal;
                descontos += descValor;
                
                const pgto = s.paymentMethod;
                if (!pagamentosMap[pgto]) pagamentosMap[pgto] = 0;
                pagamentosMap[pgto] += valorFinal;
                
                rowsHtml += `
                    <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm mb-2 flex flex-col gap-1">
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-sm text-slate-800">#${s.id} - ${s.clientName}</span>
                            <span class="font-black text-emerald-600">${formatMoney(valorFinal)}</span>
                        </div>
                        <span class="text-[11px] text-slate-500 font-bold uppercase bg-slate-100 w-max px-2 py-0.5 rounded">${s.paymentMethod}</span>
                    </div>
                `;
            });

            let pgtoRowsHtml = Object.entries(pagamentosMap).map(([metodo, valor]) => `
                <div class="flex justify-between items-center border-b border-dashed border-slate-300 py-2">
                    <span class="text-sm font-medium text-slate-600">${metodo}</span>
                    <span class="text-sm font-bold text-slate-800">${formatMoney(valor)}</span>
                </div>
            `).join('');

            if (Object.keys(salesMap).length === 0) {
                rowsHtml = '<div class="text-center p-6 text-slate-400 font-bold">Nenhuma venda registrada hoje.</div>';
            }

            const el = document.getElementById('report-result-content');
            
            el.innerHTML = `
                <div class="max-w-md mx-auto">
                    <div class="bg-white p-5 rounded-2xl border shadow-sm mb-4 text-center">
                        <h3 class="font-black text-xl text-emerald-600 mb-1">FATURAMENTO DIÁRIO</h3>
                        <p class="text-xs font-bold text-slate-500">${dataHojeLocal}</p>
                    </div>
                    
                    <div class="mb-4">
                        <h4 class="font-bold text-slate-700 mb-2 uppercase text-xs">Vendas do Dia</h4>
                        ${rowsHtml}
                    </div>

                    <div class="bg-white p-5 rounded-2xl border shadow-sm mb-4">
                        <h4 class="font-bold text-slate-700 mb-3 border-b pb-2 uppercase text-xs">Métodos de Pagamento</h4>
                        ${pgtoRowsHtml}
                    </div>

                    <div class="bg-slate-900 p-5 rounded-2xl shadow-lg mb-8 text-white">
                        <h4 class="font-bold text-slate-400 mb-3 uppercase text-xs">Resumo do Dia</h4>
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-sm">Qtd. Vendas:</span>
                            <span class="text-sm font-bold">${Object.keys(salesMap).length}</span>
                        </div>
                        ${descontos > 0 ? `
                        <div class="flex justify-between items-center mb-1 text-red-400">
                            <span class="text-sm">Descontos Totais:</span>
                            <span class="text-sm font-bold">- ${formatMoney(descontos)}</span>
                        </div>` : ''}
                        <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-700">
                            <span class="font-black text-lg">LÍQUIDO:</span>
                            <span class="font-black text-2xl text-emerald-400">${formatMoney(totalVendas)}</span>
                        </div>
                    </div>
                </div>
            `;
            
            showLoading(false);
            document.getElementById('view-report-result').classList.remove('hidden');
            document.getElementById('view-report-result').classList.add('flex');
            lucide.createIcons();
        }

        function openPeriodReportModal() {
            const hoje = new Date();
            const primeiroDia = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
            const ultimoDia = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
            document.getElementById('rep-per-start').value = toLocalYYYYMMDD(primeiroDia);
            document.getElementById('rep-per-end').value = toLocalYYYYMMDD(ultimoDia);
            document.getElementById('rep-per-payment').value = 'Todos';
            document.getElementById('rep-per-client').value = '';
            document.getElementById('modal-period-report').classList.remove('hidden');
        }

        function closePeriodReportModal() {
            document.getElementById('modal-period-report').classList.add('hidden');
        }

        function closeReportView() {
            const reportView = document.getElementById('view-report-result');
            const reportContent = document.getElementById('report-result-content');
            
            if (reportView) {
                reportView.classList.remove('flex');
                reportView.classList.add('hidden');
            }
            if (reportContent) reportContent.innerHTML = '';
        }

        function showPeriodReport() {
            showLoading(true);
            const start = document.getElementById('rep-per-start').value;
            const end = document.getElementById('rep-per-end').value;
            const payment = document.getElementById('rep-per-payment').value;
            const client = document.getElementById('rep-per-client').value.toLowerCase().trim();

            const salesMap = {};
            STATE.logs.filter(l => l.type === 'venda' && l.status !== 'CANCELADO').forEach(l => {
                if (!salesMap[l.id]) {
                    salesMap[l.id] = { id: l.id, date: l.date, clientName: l.clientName || 'Consumidor Final', paymentMethod: l.paymentMethod || 'Não Informado', discount: Number(l.discount) || 0, totalValue: 0, discountType: l.finStatus || '$' };
                }
                salesMap[l.id].totalValue += Number(l.totalValue) || 0;
            });

            let filteredSales = Object.values(salesMap);
            if (start) {
                const startD = new Date(start + "T00:00:00");
                filteredSales = filteredSales.filter(s => new Date(s.date) >= startD);
            }
            if (end) {
                const endD = new Date(end + "T23:59:59");
                filteredSales = filteredSales.filter(s => new Date(s.date) <= endD);
            }
            if (payment !== 'Todos') filteredSales = filteredSales.filter(s => s.paymentMethod === payment);
            if (client) filteredSales = filteredSales.filter(s => s.clientName.toLowerCase().includes(client));

            filteredSales.sort((a, b) => new Date(a.date) - new Date(b.date));

            if (filteredSales.length === 0) {
                showLoading(false);
                return showToast("Nenhuma venda encontrada.", true);
            }

            let totalLiquido = 0; let totalDescontos = 0; let pagamentosMap = {};
            let rowsHtml = filteredSales.map(s => {
                
                // CORREÇÃO: Lê desconto absoluto
                const descValor = Number(s.discount) || 0;
                const valorFinal = s.totalValue - descValor;

                totalLiquido += valorFinal; 
                totalDescontos += descValor;
                const pgto = s.paymentMethod;
                if (!pagamentosMap[pgto]) pagamentosMap[pgto] = 0;
                pagamentosMap[pgto] += valorFinal;

                return `
                    <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm mb-2 flex flex-col gap-1">
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-sm text-slate-800">#${s.id} - ${s.clientName}</span>
                            <span class="font-black text-emerald-600">${formatMoney(valorFinal)}</span>
                        </div>
                        <div class="flex justify-between items-center mt-1">
                            <span class="text-[10px] text-slate-400 font-bold"><i data-lucide="calendar" class="inline w-3 h-3"></i> ${formatDate(s.date)}</span>
                            <span class="text-[10px] text-slate-500 font-bold uppercase bg-slate-100 px-2 py-0.5 rounded">${s.paymentMethod}</span>
                        </div>
                    </div>
                `;
            }).join('');

            let pgtoRowsHtml = Object.entries(pagamentosMap).map(([metodo, valor]) => `
                <div class="flex justify-between items-center border-b border-dashed border-slate-300 py-2">
                    <span class="text-sm font-medium text-slate-600">${metodo}</span>
                    <span class="text-sm font-bold text-slate-800">${formatMoney(valor)}</span>
                </div>
            `).join('');

            const filtroTexto = `${start ? formatDate(start) : 'Início'} até ${end ? formatDate(end) : 'Hoje'} <br> Pgto: ${payment} ${client ? '| Cliente: ' + client : ''}`;
            const el = document.getElementById('report-result-content');
            
            el.innerHTML = `
                <div class="max-w-md mx-auto">
                    <div class="bg-white p-5 rounded-2xl border shadow-sm mb-4 text-center">
                        <h3 class="font-black text-xl text-indigo-600 mb-2">VENDAS POR PERÍODO</h3>
                        <div class="bg-indigo-50 p-2 rounded-lg text-[11px] font-bold text-indigo-800">${filtroTexto}</div>
                    </div>
                    
                    <div class="mb-4">
                        <h4 class="font-bold text-slate-700 mb-2 uppercase text-xs">Vendas Filtradas</h4>
                        ${rowsHtml}
                    </div>

                    <div class="bg-white p-5 rounded-2xl border shadow-sm mb-4">
                        <h4 class="font-bold text-slate-700 mb-3 border-b pb-2 uppercase text-xs">Métodos de Pagamento</h4>
                        ${pgtoRowsHtml}
                    </div>

                    <div class="bg-slate-900 p-5 rounded-2xl shadow-lg mb-8 text-white">
                        <h4 class="font-bold text-slate-400 mb-3 uppercase text-xs">Resumo do Período</h4>
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-sm">Qtd. Vendas:</span>
                            <span class="text-sm font-bold">${filteredSales.length}</span>
                        </div>
                        ${totalDescontos > 0 ? `
                        <div class="flex justify-between items-center mb-1 text-red-400">
                            <span class="text-sm">Descontos Totais:</span>
                            <span class="text-sm font-bold">- ${formatMoney(totalDescontos)}</span>
                        </div>` : ''}
                        <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-700">
                            <span class="font-black text-lg">LÍQUIDO:</span>
                            <span class="font-black text-2xl text-indigo-400">${formatMoney(totalLiquido)}</span>
                        </div>
                    </div>
                </div>
            `;
            
            showLoading(false);
            closePeriodReportModal();
            document.getElementById('view-report-result').classList.remove('hidden');
            document.getElementById('view-report-result').classList.add('flex');
            lucide.createIcons();
        }

        function renderProducts() {
            const list = document.getElementById('prod-list');
            if(!list) return;

            const term = document.getElementById('prod-search')?.value.toLowerCase() || '';
            const catFilter = document.getElementById('prod-category')?.value || '';
            const catSelect = document.getElementById('prod-category');
            
            if (catSelect) {
                const currentVal = catSelect.value;
                catSelect.innerHTML = '<option value="">Todas as Categorias</option>';
                const categoriasUnicas = [...new Set(STATE.products.map(p => p.category))].filter(c => c && c.trim() !== '');
                categoriasUnicas.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    catSelect.appendChild(option);
                });
                catSelect.value = currentVal;
            }

            let filtered = STATE.products.slice();
            if (term) filtered = filtered.filter(p => p.name.toLowerCase().includes(term));
            if (catFilter) filtered = filtered.filter(p => p.category === catFilter);

            if (filtered.length === 0) {
                list.innerHTML = '<div class="p-10 text-center text-slate-400 font-bold">Nenhum produto cadastrado.</div>';
                return;
            }

            list.innerHTML = filtered.map(p => `
            <div class="bg-white p-4 rounded-2xl border shadow-sm flex items-center justify-between mb-1">
                <div class="flex flex-col flex-1 mr-2 overflow-hidden">
                    <h4 class="font-black text-slate-800 text-sm truncate mb-1">${p.name}</h4>
                    <span class="text-[10px] text-slate-500 font-bold bg-slate-100 px-2 py-1 rounded w-max uppercase">${p.category || 'Geral'}</span>
                </div>
                <div class="flex flex-col items-end gap-1">
                    <span class="font-black text-orange-500 text-lg">${formatMoney(p.price)}</span>
                    <span class="text-[10px] text-slate-400 font-bold">Estoque: <span class="${p.available <= 0 ? 'text-red-500' : 'text-emerald-500'}">${p.available}</span></span>
                </div>
                <button onclick="openProductForm('${p.id}')" class="ml-4 p-3 bg-slate-50 text-slate-500 rounded-xl hover:bg-slate-200 active:scale-95 transition">
                    <i data-lucide="edit-3" class="w-5 h-5"></i>
                </button>
            </div>`).join('');
            lucide.createIcons(); 
        }

        function openProductForm(id) { 
            document.getElementById('prod-form-container').classList.remove('hidden'); 
            if(id) { 
                const p = STATE.products.find(x => x.id == id); 
                document.getElementById('prd-id').value = p.id; 
                document.getElementById('prd-name').value = p.name; 
                document.getElementById('prd-cat').value = p.category || ''; 
                document.getElementById('prd-price').value = p.price; 
                document.getElementById('prd-cost').value = p.cost || ''; 
                document.getElementById('prd-stock').value = p.stock; 
            } else { 
                document.getElementById('prd-id').value = ''; 
                document.getElementById('prd-name').value = ''; 
                document.getElementById('prd-cat').value = ''; 
                document.getElementById('prd-price').value = ''; 
                document.getElementById('prd-cost').value = ''; 
                document.getElementById('prd-stock').value = ''; 
            } 
        }

        async function saveProduct(e) {
            e.preventDefault();
            showLoading(true);
            const isNew = !document.getElementById('prd-id').value;
            const newId = isNew ? getNextId(STATE.products) : document.getElementById('prd-id').value;

            const payload = {
                id: newId, nome: document.getElementById('prd-name').value, categoria: document.getElementById('prd-cat').value,
                preco: parseFloat(document.getElementById('prd-price').value), 
                custo: parseFloat(document.getElementById('prd-cost').value) || 0,
                estoque_fisico: parseFloat(document.getElementById('prd-stock').value),
                estoque_comprometido: isNew ? 0 : STATE.products.find(p=>p.id==newId).committed
            };

            const { error } = await sb.from('produtos').upsert(payload);
            if(error) { showLoading(false); return showToast("Erro: " + error.message, true); }

            document.getElementById('prod-form-container').classList.add('hidden');
            showToast("Produto Salvo!");
            loadData();
        }

        function renderClients() {
            const list = document.getElementById('clients-list');
            if(!list) return;
            
            const term = document.getElementById('cli-search')?.value.toLowerCase() || '';
            let filtered = STATE.clients || [];

            if (term) {
                filtered = filtered.filter(c => 
                    c.name.toLowerCase().includes(term) || 
                    (c.phone && c.phone.toLowerCase().includes(term)) || 
                    (c.doc && c.doc.toLowerCase().includes(term))
                );
            }

            const sliced = filtered.slice(0, 150);

            if (sliced.length === 0) {
                list.innerHTML = '<div class="p-10 text-center text-slate-400 font-bold">Nenhum cliente encontrado.</div>';
                return;
            }

            list.innerHTML = sliced.map(c => {
                let num = c.phone ? c.phone.replace(/\D/g, '') : '';
                if (num.length >= 10 && !num.startsWith('55')) num = '55' + num;
                const zapLink = num ? `https://wa.me/${num}` : '#';
                const hasZap = num.length >= 10;
                
                const zapClass = hasZap ? 'bg-green-50 text-green-600 hover:bg-green-100' : 'bg-slate-50 text-slate-300 pointer-events-none';

                return `
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center mb-1">
                    <div class="flex flex-col flex-1 truncate mr-3">
                        <span class="font-bold text-sm text-slate-800 truncate">${c.name}</span>
                        <span class="text-[11px] text-slate-500 font-medium mt-0.5">${c.phone || 'Sem telefone'}</span>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <a href="${zapLink}" ${hasZap ? 'target="_blank"' : ''} class="w-10 h-10 flex items-center justify-center rounded-full transition-colors active:scale-95 ${zapClass}" title="WhatsApp">
                            <i data-lucide="message-circle" class="w-5 h-5"></i>
                        </a>
                        <button onclick="openClientForm('${c.id}')" class="w-10 h-10 flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-full transition-colors active:scale-95" title="Editar">
                            <i data-lucide="edit-3" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function openClientForm(id) { 
            document.getElementById('client-form-container').classList.remove('hidden'); 
            if(id) {
                const c = STATE.clients.find(x => String(x.id) === String(id));
                if(c) {
                    document.getElementById('cli-id').value = c.id;
                    document.getElementById('cli-name').value = c.name;
                    document.getElementById('cli-phone').value = c.phone;
                    document.getElementById('cli-doc').value = c.doc;
                    document.getElementById('cli-addr').value = c.address;
                }
            } else {
                document.getElementById('cli-id').value = '';
                document.getElementById('cli-name').value = '';
                document.getElementById('cli-phone').value = '';
                document.getElementById('cli-doc').value = '';
                document.getElementById('cli-addr').value = '';
            }
        }

        async function saveClient(e) {
            e.preventDefault();
            showLoading(true);
            const isNew = !document.getElementById('cli-id').value;
            const newId = isNew ? getNextId(STATE.clients) : document.getElementById('cli-id').value;

            const payload = {
                id: newId, nome: document.getElementById('cli-name').value, telefone: document.getElementById('cli-phone').value,
                documento: document.getElementById('cli-doc').value, endereco: document.getElementById('cli-addr').value
            };

            const { error } = await sb.from('clientes').upsert(payload);
            if(error) { showLoading(false); return showToast("Erro: " + error.message, true); }
            
            document.getElementById('client-form-container').classList.add('hidden');
            showToast("Cliente Salvo!");
            loadData();
        }

        function fazerLogout() {
            localStorage.removeItem('rv_user');
            window.location.replace('index.html');
        }
    </script>
  </body>
</html>
